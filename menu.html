<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu</title>
  <style>
    :root{
      --bg:#000; --fg:#fff;
      --muted:rgba(255,255,255,.68);
      --muted2:rgba(255,255,255,.5);
      --card:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.14);
      --lime:#B7FF2A;
      --pad:18px;
      --radius:16px;
    }
    html,body{height:100%;}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
    a{color:inherit;text-decoration:none}
    .screen{min-height:100%;display:flex;flex-direction:column}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:12px;}
    .brand{font-weight:650;letter-spacing:.2px}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--stroke);background:rgba(255,255,255,.06);padding:8px 12px;border-radius:999px;color:var(--muted);font-size:12px}
    .content{flex:1;padding:0 16px 18px 16px;max-width:980px;margin:0 auto;width:100%}
    .h1{margin:10px 0 6px 0;text-align:center;letter-spacing:.8px}
    .sub{margin:0 0 18px 0;text-align:center;color:var(--muted);font-size:13px}
    .sectionTitle{margin:18px 0 10px 0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.4px}
    .levels{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .levelCard{
      width:96px; height:74px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer; user-select:none;
      transition:transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .levelCard:hover{transform:translateY(-1px)}
    .levelCard.active{
      border-color:rgba(183,255,42,.55);
      box-shadow:0 0 0 2px rgba(183,255,42,.12) inset, 0 0 14px rgba(183,255,42,.18);
      background:rgba(183,255,42,.10);
    }
    .levelInner{font-weight:700;font-size:14px;line-height:1.05;text-align:center}
    .levelLabel{margin-top:6px;font-size:11px;color:var(--muted2)}
    .topics{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
    .topicCard{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      border-radius:16px;
      padding:14px 14px 12px 14px;
      display:flex;flex-direction:column;gap:8px;
    }
    .topicTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .topicName{font-weight:700}
    .topicMeta{color:var(--muted);font-size:12px}
    .topicBtns{display:flex;gap:10px;margin-top:6px}
    .btn{
      flex:1;
      border-radius:14px;
      padding:12px 14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      font-weight:650;
      cursor:pointer;
    }
    .btnPrimary{
      border-color:rgba(183,255,42,.55);
      background:rgba(183,255,42,.12);
      box-shadow:0 0 14px rgba(183,255,42,.18);
    }
    .btn:active{transform:translateY(1px)}
    .nav{
      position:sticky;bottom:0;
      display:flex;justify-content:space-around;gap:10px;
      padding:10px 14px;
      border-top:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.75);
      backdrop-filter: blur(10px);
    }
    .nav .navBtn{
      width:110px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      color:var(--muted);
      font-size:12px;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      gap:8px;
    }
    .nav .navBtn.primary{color:#000;background:rgba(183,255,42,.92);border-color:rgba(183,255,42,.65);font-weight:750}
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="brand">Hack_JP_quiz</div>
      <div class="pill" id="sitePill">GitHub Pages mode</div>
    </div>

    <div class="content">
      <h2 class="h1">CHOOSE A QUIZ</h2>
      <p class="sub">Pick a level → choose a set → start.</p>

      <div class="sectionTitle">Level</div>
      <div class="levels" id="levels"></div>

      <div class="sectionTitle">Sets</div>
      <div class="topics" id="topics"></div>
    </div>

    <div class="nav">
      <button class="navBtn primary" id="navHome">Home</button>
      <button class="navBtn" id="navReview">Review</button>
      <button class="navBtn" id="navSaved">Saved</button>
    </div>
  </div>

<script>
/* =========================================================
   Menu (GitHub-friendly)
   - Loads sets.csv from repo (no upload.html, no local upload)
========================================================= */

function parseCSV(text){
  const rows=[]; let row=[]; let cur=""; let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c === '"'){
      if(inQ && n === '"'){ cur+='"'; i++; }
      else inQ=!inQ;
    } else if(c === ',' && !inQ){
      row.push(cur); cur="";
    } else if((c==='\n' || c==='\r') && !inQ){
      if(c==='\r' && n==='\n') i++;
      row.push(cur);
      if(row.some(v=>v.trim()!=="")) rows.push(row);
      row=[]; cur="";
    } else cur+=c;
  }
  row.push(cur);
  if(row.some(v=>v.trim()!=="")) rows.push(row);

  const header = rows.shift().map(h=>h.trim());
  return rows.map(r=>{
    const o={};
    header.forEach((h,idx)=>o[h]=(r[idx]??"").trim());
    return o;
  });
}

const LEVELS = [
  { id:"A1",  jlpt:"N5", label:"Beginner" },
  { id:"A2",  jlpt:"N4", label:"Elementary" },
  { id:"B1",  jlpt:"N3", label:"Intermediate" },
  { id:"B2",  jlpt:"N2", label:"Upper" },
  { id:"C1/2",jlpt:"N1", label:"Advanced" },
];

let allSets = [];
let selectedLevels = new Set(["A1"]);

function renderLevels(){
  const el = document.getElementById("levels");
  el.innerHTML = "";
  for(const lv of LEVELS){
    const card = document.createElement("div");
    const isOn = selectedLevels.has(lv.id);
    card.className = "levelCard" + (isOn ? " active" : "");
    const inner = document.createElement("div");
    inner.className = "levelInner";
    inner.innerHTML = `${lv.id}<br>${lv.jlpt}`;
    const label = document.createElement("div");
    label.className = "levelLabel";
    label.textContent = lv.label;
    card.appendChild(inner);
    card.appendChild(label);
    card.addEventListener("click", ()=>{
      if(selectedLevels.has(lv.id)) selectedLevels.delete(lv.id);
      else selectedLevels.add(lv.id);
      renderLevels();
      renderTopics();
    });
    el.appendChild(card);
  }
}

function groupBy(arr, key){
  const m = new Map();
  for(const x of arr){
    const k = (x[key] || "").trim();
    if(!m.has(k)) m.set(k, []);
    m.get(k).push(x);
  }
  return m;
}

function renderTopics(){
  const wrap = document.getElementById("topics");
  wrap.innerHTML = "";

  const filtered = allSets.filter(s => selectedLevels.has((s.level_cefr||"").trim()));
  if(filtered.length === 0){
    wrap.innerHTML = `<div class="topicCard">
      <div class="topicName">No sets for this level yet</div>
      <div class="topicMeta">Add rows in sets.csv (level_cefr) and questions.csv (set_id).</div>
    </div>`;
    return;
  }

  const byTopic = groupBy(filtered, "topic_title_en");
  for(const [topic, sets] of byTopic.entries()){
    for(const s of sets){
      const card = document.createElement("div");
      card.className = "topicCard";

      const top = document.createElement("div");
      top.className = "topicTop";
      const name = document.createElement("div");
      name.className = "topicName";
      name.textContent = (s.set_title_en || s.quiz_title_en || s.set_id || "Untitled");

      const meta = document.createElement("div");
      meta.className = "topicMeta";
      meta.textContent = `${(s.level_cefr||"")} ${(s.level_jlpt||"")} • ${s.set_id}`;

      top.appendChild(name);
      top.appendChild(meta);

      const btns = document.createElement("div");
      btns.className = "topicBtns";
      const start = document.createElement("button");
      start.className = "btn btnPrimary";
      start.textContent = "Start";
      start.addEventListener("click", ()=>{
        location.href = `quiz.html?set=${encodeURIComponent(s.set_id)}`;
      });

      const open = document.createElement("button");
      open.className = "btn";
      open.textContent = "Open";
      open.addEventListener("click", ()=>{
        location.href = `quiz.html?set=${encodeURIComponent(s.set_id)}`;
      });

      btns.appendChild(start);
      btns.appendChild(open);

      card.appendChild(top);
      card.appendChild(btns);
      wrap.appendChild(card);
    }
  }
}

async function boot(){
  try{
    const res = await fetch("sets.csv", {cache:"no-store"});
    if(!res.ok) throw new Error("Could not fetch sets.csv");
    const csv = await res.text();
    const rows = parseCSV(csv);

    // only published
    allSets = rows.filter(r => String(r.is_published||"").trim() === "1");

    renderLevels();
    renderTopics();
  }catch(err){
    console.error(err);
    alert("Menu cannot load sets.csv.\n\nMake sure sets.csv is in the SAME folder as menu.html in the repo.");
  }
}

document.getElementById("navHome").addEventListener("click", ()=> location.href="splash.html");
document.getElementById("navReview").addEventListener("click", ()=> alert("Review later (we will wire it)."));
document.getElementById("navSaved").addEventListener("click", ()=> alert("Saved later (we will wire it)."));

boot();
</script>
</body>
</html>

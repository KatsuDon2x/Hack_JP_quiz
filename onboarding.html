<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Onboarding</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
    }

    /* ===== Viewport container ===== */
    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* ===== Artboard (iPhone 12 ratio: 1170 × 2532) ===== */
    .canvas {
      position: absolute;
      left: 0;
      top: 0;

      width: 1170px;
      height: 2532px;

      display: flex;
      flex-direction: column;
      align-items: center;

      transform-origin: top left;
      transform: translate(0,0) scale(1);
    }

    img {
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      height: auto;
    }

    /* ===== Elements inside the artboard ===== */

    .logo {
      width: 700px;
      margin-top: 120px;
      transform: scale(0.75);
      transform-origin: top center;
    }

    .msg {
      width: 900px;
      margin-top: 160px;
      transform: scale(0.75);
      transform-origin: top center;
    }

.start {
  width: 880px;
  margin-top: 220px;
  transform: scale(0.75);
  transform-origin: top center;
  cursor: pointer;
  z-index: 2;

  filter:
  drop-shadow(0 0 3px rgba(255, 255, 255, 0.8))
  drop-shadow(0 0 20px rgba(0, 255, 180, 0.6))
  drop-shadow(0 0 40px rgba(0, 255, 180, 0.9))
  drop-shadow(0 14px 20px rgba(0, 0, 0, 0.45)); /* shadow */
  transition: filter 0.25s ease, transform 0.25s ease;
}

.start:active {
  transform: scale(0.72) translateY(6px);
  filter:
    drop-shadow(0 0 12px rgba(0,255,180,0.4))
    drop-shadow(0 6px 10px rgba(0,0,0,0.35));
}

    .collageWrap {
      width: 1100px;
      height: 600px;
      margin-top: auto;
      margin-bottom: 80px;

      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
    }

    .collage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      opacity: .98;
    }

@keyframes pulseGlow {
  0%   { filter: drop-shadow(0 0 20px rgba(0,255,180,0.6)); }
  50%  { filter: drop-shadow(0 0 60px rgba(100,255,180,1)); }
  100% { filter: drop-shadow(0 0 20px rgba(0,255,180,0.6)); }
}

.start {
  animation: pulseGlow 1.8s infinite ease-in-out;
}


  </style>
</head>

<body>
  <div class="viewport">
    <main class="canvas" id="canvas">

      <img class="logo"
        src="assets/ui/logos/logo-katsudon_entertainment_hack_quiz_logo.png"
        alt="Katsu-Don Entertainment Logo" />

      <img class="msg"
        src="assets/ui/messages/message-get_started.png"
        alt="Get Started Message" />

      <img class="start" id="startBtn"
        src="assets/ui/buttons/button-onboarding_screen-start.png"
        alt="Start Button" />

      <div class="collageWrap" aria-hidden="true">
        <img class="collage"
          src="assets/ui/mood/image-collage-gifu.png"
          alt="Collage Image" />
      </div>

    </main>
  </div>

  <script>
    const DESIGN_W = 1170;
    const DESIGN_H = 2532;

    const canvas = document.getElementById("canvas");

    function layout() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // Scale the artboard to fit inside the screen while keeping aspect ratio
      const s = Math.min(vw / DESIGN_W, vh / DESIGN_H);

      const scaledW = DESIGN_W * s;
      const scaledH = DESIGN_H * s;

      // Center horizontally, slightly offset upward vertically
      const x = Math.round((vw - scaledW) / 2);
      const extraY = (vh - scaledH);
      const y = Math.round(Math.max(0, extraY * 0.10));

      canvas.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    }

    window.addEventListener("resize", layout);
    layout();

    function goNext() { location.href = "menu.html"; }
    document.getElementById("startBtn").addEventListener("click", goNext);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goNext();
      }
    });
  </script>
</body>

</html>

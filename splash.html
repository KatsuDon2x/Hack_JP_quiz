<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Splash</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
    }

    /* ===== Viewport container ===== */
    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    /* ===== Artboard (iPhone 12 ratio: 1170 × 2532) ===== */
    .canvas {
      position: absolute;
      left: 0;
      top: 0;

      width: 1170px;
      height: 2532px;

      transform-origin: top left;
      transform: translate(0,0) scale(1);
    }

    /* Video fills the artboard */
    .bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;

      /* ✅ never crop: show entire video */
      object-fit: contain;
      object-position: center;
      background: #000;
    }

    /* Optional: ultra subtle whisper */
    .whisper {
      position: absolute;
      left: 50%;
      bottom: 120px;
      transform: translateX(-50%);
      font-size: 22px;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.35s ease;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 2px 14px rgba(0,0,0,0.6);
    }
    .whisper.show { opacity: 0.18; }

    /* If you want zero text, set display:none; */
    /* .whisper { display:none; } */
  </style>
</head>

<body>
  <div class="viewport" id="tapZone" role="button" tabindex="0" aria-label="Tap anywhere to continue">
    <main class="canvas" id="canvas">
      <video class="bgVideo" autoplay muted playsinline loop preload="auto">
        <source src="assets/ui/video/background-splash_screen.mp4" type="video/mp4" />
      </video>

      <div class="whisper" id="whisper">Tap anywhere</div>
    </main>
  </div>

  <script>
    // Poster-mode contain-fit (same pattern as onboarding.html)
    const DESIGN_W = 1170;
    const DESIGN_H = 2532;

    const canvas = document.getElementById("canvas");
    const whisper = document.getElementById("whisper");

    function layout() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // ✅ contain-fit: whole artboard always visible
      const s = Math.min(vw / DESIGN_W, vh / DESIGN_H);

      const scaledW = DESIGN_W * s;
      const scaledH = DESIGN_H * s;

      // Center horizontally, slight top bias (same philosophy)
      const x = Math.round((vw - scaledW) / 2);
      const extraY = (vh - scaledH);
      const y = Math.round(Math.max(0, extraY * 0.10));

      canvas.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    }

    window.addEventListener("resize", layout);
    layout();

    // Whisper appears after 2.5s (optional)
    setTimeout(() => whisper.classList.add("show"), 2500);

    function goNext() {
      location.href = "onboarding.html";
    }

    // Tap/click anywhere
    document.getElementById("tapZone").addEventListener("click", goNext);

    // Keyboard
    document.getElementById("tapZone").addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goNext();
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Result</title>
  <style>
    body{ margin:0; background:#000; color:#fff; font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif; }
    .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px; }
    .card{ width:min(720px,100%); border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); border-radius:22px; padding:22px; }
    .big{ font-size:52px; font-weight:800; margin:10px 0; }
    .muted{ color:rgba(255,255,255,.68); }
    .btn{ margin-top:16px; display:inline-block; padding:12px 14px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.08); color:#fff; text-decoration:none; }
    .btn:hover{ border-color:rgba(200,255,46,.55); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="muted" id="setLine">Set: -</div>
      <div class="big" id="scoreLine">0 / 0</div>
      <div class="muted" id="pctLine">0%</div>
      <a class="btn" href="menu.html">Back to Menu</a>
      <a class="btn" href="quiz.html?data=data/dictation.csv&setId=gift01&title=Dictation%20Gift">Play Again</a>
    </div>
  </div>

  <script>
    const setId = localStorage.getItem("JPQ_LAST_SET_ID") || "-";
    const score = Number(localStorage.getItem("JPQ_LAST_SCORE") || "0");
    const total = Number(localStorage.getItem("JPQ_LAST_TOTAL") || "0");
    const pct = total ? Math.round((score/total)*100) : 0;

    document.getElementById("setLine").textContent = `Set: ${setId}`;
    document.getElementById("scoreLine").textContent = `${score} / ${total}`;
    document.getElementById("pctLine").textContent = `${pct}%`;
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Result</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #fff;
}

/* ===== Viewport wrapper ===== */
.viewport {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
}

/* ===== Artboard (iPhone 12: 1170 × 2532) ===== */
.canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 1170px;
    height: 2532px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top left;
    transform: translate(0,0) scale(1);
}

/* ===== Elements ===== */
img {
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    height: auto;
}

/* Logo (same size & placement as onboarding) */
.logo {
    width: 700px;
    margin-top: 120px;
    transform: scale(0.75);
    transform-origin: top center;
    opacity: 0;
    transition: opacity .28s ease, transform .28s ease;
}
.logo.show {
    opacity: 1;
    transform: scale(0.75) translateX(0);
}

/* Score message */
.msgScore {
    width: 700px;
    margin-top: 160px;
    transform: scale(0.75);
    transform-origin: top center;
    opacity: 0;
    transition: opacity .28s ease, transform .28s ease;
}
.msgScore.show {
    opacity: 1;
}

/* Score pill */
.scoreWrap {
    margin-top: 40px;
    opacity: 0;
    transition: opacity .28s ease, transform .28s ease;
}
.scoreWrap.show {
    opacity: 1;
}

.scorePill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 32px;
    border-radius: 999px;
    background: linear-gradient(180deg, #FF9A52, #FF7A2F);
    color: #000;
    font-weight: 950;
    font-size: 200px;
    letter-spacing: 1px;
    box-shadow: 0 18px 40px rgba(0,0,0,.45);
    border: 1px solid rgba(0,0,0,.15);
}
.scorePill .pct {
    font-size: 56px;
    opacity: .9;
}

/* Good job message */
.goodJob {
    width: 900px;
    margin-top: 120px;
    transform: scale(0.75);
    transform-origin: top center;
    opacity: 0;
    transition: opacity .28s ease, transform .28s ease;
}
.goodJob.show {
    opacity: 1;
}

/* Slide-out animation */
.exitLeft {
    opacity: 0 !important;
    transform: translateX(-80px) !important;
    transition: opacity .30s ease, transform .30s ease;
}

/* ===== Action buttons ===== */
.actions {
    margin-top: auto;
    margin-bottom: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
}
.actions.show {
    opacity: 1;
}

.row2 {
    display: flex;
    gap: 32px;
    justify-content: center;
}

.btnImg {
    width: 600px;
    transform: scale(0.75);
    cursor: pointer;
    transition: transform .2s ease;
}
.btnImg:active {
    transform: scale(0.70);
}

.btnQuit {
    width: 700px;
    transform: scale(0.6);
}

/* ===== Bottom nav ===== */
.nav {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 40px;
    opacity: 0;
    transition: opacity .25s ease;
}
.nav.show {
    opacity: 1;
}
.nav img {
    width: 200px;
    transform: scale(0.75);
    cursor: pointer;
}
</style>
</head>

<body>
<div class="viewport">
<main class="canvas" id="canvas">

    <!-- Logo -->
    <img id="logo" class="logo"
         src="assets/ui/logos/logo-katsudon_entertainment_hack_quiz_logo.png"
         alt="Logo" />

    <!-- Score message -->
    <img id="msgScore" class="msgScore"
         src="assets/ui/messages/message-score.png"
         alt="Score" />

    <!-- Score pill -->
    <div id="scoreWrap" class="scoreWrap">
        <div class="scorePill">
            <span id="scoreNum">0</span><span class="pct">%</span>
        </div>
    </div>

    <!-- Good job -->
    <img id="goodJob" class="goodJob"
         src="assets/ui/messages/message-good_job.png"
         alt="Good Job" />

    <!-- Action buttons -->
    <div id="actions" class="actions">
        <div class="row2">
            <img id="btnRepeat" class="btnImg"
                 src="assets/ui/buttons/button-navigation-repeat.png"
                 alt="Repeat" />
            <img id="btnContinue" class="btnImg"
                 src="assets/ui/buttons/button-navigation-continue.png"
                 alt="Continue" />
        </div>
        <img id="btnQuit" class="btnImg btnQuit"
             src="assets/ui/buttons/button-navigation-quit.png"
             alt="Quit" />
    </div>

    <!-- Bottom nav -->
    <div id="nav" class="nav">
        <img id="navReview"
             src="assets/ui/buttons/button-navigation-review.png"
             alt="Review" />
        <img id="navSaved"
             src="assets/ui/buttons/button-navigation-saved.png"
             alt="Saved" />
        <img id="navHome"
             src="assets/ui/buttons/button-navigation-home.png"
             alt="Home" />
    </div>

</main>
</div>

<script>
/* ===== Artboard scaling (same as onboarding) ===== */
const DESIGN_W = 1170;
const DESIGN_H = 2532;
const canvas = document.getElementById("canvas");

function layout() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const s = Math.min(vw / DESIGN_W, vh / DESIGN_H);
    const scaledW = DESIGN_W * s;
    const scaledH = DESIGN_H * s;
    const x = Math.round((vw - scaledW) / 2);
    const extraY = (vh - scaledH);
    const y = Math.round(Math.max(0, extraY * 0.10));
    canvas.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
}
window.addEventListener("resize", layout);
layout();

/* ===== Score logic ===== */
const LS_LAST_SET = "JPQ_LAST_SET_ID";
const LS_LAST_SCORE = "JPQ_LAST_SCORE";
const LS_LAST_TOTAL = "JPQ_LAST_TOTAL";

const setId = localStorage.getItem(LS_LAST_SET) || "";
const rawScore = Number(localStorage.getItem(LS_LAST_SCORE) || 0);
const total = Math.max(1, Number(localStorage.getItem(LS_LAST_TOTAL) || 1));
const score = Math.min(Math.max(0, rawScore), total);
const pctFinal = Math.round((score / total) * 100);

/* ===== Elements ===== */
const logo = document.getElementById("logo");
const msgScore = document.getElementById("msgScore");
const scoreWrap = document.getElementById("scoreWrap");
const scoreNum = document.getElementById("scoreNum");
const goodJob = document.getElementById("goodJob");
const actions = document.getElementById("actions");
const nav = document.getElementById("nav");

/* ===== Animation helpers ===== */
const wait = (ms)=> new Promise(r=>setTimeout(r, ms));

function countUp(to, ms=900){
    const start = performance.now();
    function tick(now){
        const t = Math.min(1, (now-start)/ms);
        scoreNum.textContent = String(Math.round(to * t));
        if(t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

/* ===== Run animation sequence ===== */
async function run(){
    nav.classList.add("show");
    await wait(220);

    logo.classList.add("show");
    await wait(260);

    msgScore.classList.add("show");
    await wait(260);

    scoreWrap.classList.add("show");
    await wait(140);
    countUp(pctFinal, 950);

    await wait(260);
    goodJob.classList.add("show");

    await wait(1200);
    msgScore.classList.add("exitLeft");
    scoreWrap.classList.add("exitLeft");
    goodJob.classList.add("exitLeft");

    await wait(340);
    msgScore.style.display = "none";
    scoreWrap.style.display = "none";
    goodJob.style.display = "none";

    actions.classList.add("show");
}
run();

/* ===== Buttons ===== */
document.getElementById("btnRepeat").addEventListener("click", ()=>{
    if(!setId){ location.href="menu.html"; return; }
    location.href = `quiz.html?set_id=${encodeURIComponent(setId)}`;
});
document.getElementById("btnContinue").addEventListener("click", ()=>{
    location.href = "menu.html";
});
document.getElementById("btnQuit").addEventListener("click", ()=>{
    location.href = "upload.html";
});

document.getElementById("navHome").addEventListener("click",
    ()=> location.href = "upload.html");
document.getElementById("navReview").addEventListener("click", ()=>{
    if(!setId){ location.href="menu.html"; return; }
    location.href = `quiz.html?mode=review&set_id=${encodeURIComponent(setId)}`;
});
document.getElementById("navSaved").addEventListener("click", () => {
    if (!setId) {
        location.href = "menu.html";
        return;
    }
    location.href = `quiz.html?mode=saved&set_id=${encodeURIComponent(setId)}`;
});
</script>
</body>
</html>

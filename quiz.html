<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.68);
      --muted2:rgba(255,255,255,.5);
      --card:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.14);
      --lime:#B7FF2A;
      --pad:18px;
      --radius:16px;
    }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
    }
    .wrap{ min-height:100%; display:flex; flex-direction:column; }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      background:rgba(0,0,0,.55);
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
    }
    .pill{
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:999px;
      background:var(--card);
      border:1px solid var(--stroke);
      font-size:14px; color:var(--muted);
      white-space:nowrap;
    }
    .pill strong{ color:var(--fg); font-weight:700; }
    .btn{
      border:1px solid var(--stroke);
      background:var(--card);
      color:var(--fg);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{ border-color: rgba(183,255,42,.55); }
    .btn-primary{
      border-color: rgba(183,255,42,.65);
      box-shadow: 0 0 0 2px rgba(183,255,42,.12) inset;
    }
    .btn-primary:hover{
      box-shadow: 0 0 0 2px rgba(183,255,42,.20) inset, 0 0 18px rgba(183,255,42,.16);
    }
    .main{ flex:1; padding:var(--pad); display:flex; justify-content:center; }
    .card{
      width:min(980px, 100%);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:22px;
      padding:18px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }
    .q-meta{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .q-title{ font-size:14px; color:var(--muted); margin:0; }
    .q-text{ font-size:22px; line-height:1.45; margin:0 0 14px; word-break:break-word; }
    .media{ display:grid; grid-template-columns:1fr; gap:12px; margin:10px 0 14px; }
    .media img{
      width:100%; border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.03);
      display:block;
    }
    .choices{ display:grid; gap:10px; margin-top:10px; }
    .choice{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      border-radius:16px;
      padding:12px 14px;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, border-color .2s ease, background .2s ease;
    }
    .choice:hover{
      border-color: rgba(183,255,42,.55);
      transform: translateY(-1px);
    }
    .choice .jp{ font-size:18px; }
    .choice .en{ font-size:14px; color:var(--muted); margin-top:4px; }
    .inputRow{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    .input{
      flex:1;
      min-width: 240px;
      font-size:18px;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      outline:none;
    }
    .input:focus{
      border-color: rgba(183,255,42,.65);
      box-shadow: 0 0 0 3px rgba(183,255,42,.12);
    }
    .hint{ margin-top:10px; color:var(--muted); font-size:14px; }
    .hint .ans{ color: rgba(255,255,255,.9); }
    .small{ font-size:12px; color:rgba(255,255,255,.5); margin-top:10px; }
    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(0,0,0,.75);
      border:1px solid rgba(255,255,255,.18);
      color:var(--fg);
      padding:10px 14px;
      border-radius:999px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,.55);
      display:none;
      z-index:1000;
      max-width: min(640px, 92vw);
      text-align:center;
    }
    .toast.show{ display:block; }
    .toast.ok{ border-color: rgba(183,255,42,.55); }
    .toast.ng{ border-color: rgba(255,90,90,.55); }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="pill"><span>Progress</span><strong id="counter">0/0</strong></div>
      <div class="pill"><span>Score</span><strong id="score">0</strong></div>
      <button class="btn" id="exitBtn">Exit</button>
    </div>

    <div class="main">
      <div class="card">
        <div class="q-meta">
          <p class="q-title" id="setTitle">Quiz</p>
          <p class="q-title" id="qTypeLabel"></p>
        </div>

        <p class="q-text" id="qText">Loading…</p>

        <div class="media" id="media"></div>

        <div id="choices" class="choices" style="display:none;"></div>

        <div id="inputArea" style="display:none;">
          <div class="inputRow">
            <input class="input" id="inputField" placeholder="Type your answer…" autocomplete="off" />
            <button class="btn btn-primary" id="checkInputBtn">Check</button>
            <button class="btn" id="skipBtn">Skip</button>
          </div>
          <div class="hint" id="hint"></div>
        </div>

        <div class="small" id="debug"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========= Basic helpers =========
    const $ = (id) => document.getElementById(id);
    const RESULT_URL = "result.html";

    const KEY_SET_ID = "JPQ_LAST_SET_ID";
    const KEY_SCORE  = "JPQ_LAST_SCORE";
    const KEY_TOTAL  = "JPQ_LAST_TOTAL";

    const DEFAULT_DATA_PATH = "data/quiz.csv";
    const CACHE_BUST = "v=" + Date.now();
    const REPO_BASE = location.pathname.replace(/\/[^\/]*$/, "/");

    // SFX
    const SFX = {
      correct: REPO_BASE + "assets/ui/audio/sfx_pin.mp3",
      wrong:   REPO_BASE + "assets/ui/audio/sfx_bu.mp3",
      done:    REPO_BASE + "assets/ui/audio/sfx_applause.mp3",
    };

    let AUDIO_UNLOCKED = false;
    function unlockAudioOnce(){
      if (AUDIO_UNLOCKED) return;
      AUDIO_UNLOCKED = true;
      const a = new Audio();
      a.src = "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAA==";
      a.volume = 0;
      a.play().catch(()=>{});
    }
    document.addEventListener("pointerdown", unlockAudioOnce, { once: true });

    function playSfxByName(name){
      unlockAudioOnce();
      const src = SFX[name];
      if(!src) return;
      const a = new Audio(src);
      a.volume = 0.95;
      a.play().catch(()=>{});
    }

    function getParam(name){
      const u = new URL(location.href);
      return u.searchParams.get(name);
    }

    function escapeHtml(s){
      return (s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function normalizeLoose(s){
      return (s ?? "")
        .trim()
        .replace(/\s+/g, "")
        .replace(/[’‘]/g, "'")
        .toLowerCase();
    }

    function showToast(msg, ok=true){
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast show " + (ok ? "ok" : "ng");
      clearTimeout(showToast._tm);
      showToast._tm = setTimeout(()=>{ t.className = "toast"; }, 900);
    }

    // ========= CSV parser =========
    function parseCSV(text){
      const rows = [];
      let row = [], cur = "", inQ = false;
      for(let i=0;i<text.length;i++){
        const ch = text[i];
        const next = text[i+1];

        if(ch === '"' && inQ && next === '"'){ cur += '"'; i++; continue; }
        if(ch === '"'){ inQ = !inQ; continue; }

        if(ch === ',' && !inQ){ row.push(cur); cur = ""; continue; }
        if((ch === '\n' || ch === '\r') && !inQ){
          if(ch === '\r' && next === '\n') i++;
          row.push(cur); cur = "";
          if(row.some(c => (c ?? "").trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cur += ch;
      }
      row.push(cur);
      if(row.some(c => (c ?? "").trim() !== "")) rows.push(row);

      if(rows.length === 0) return [];

      const header = rows[0].map(h => (h ?? "").trim());
      const out = [];
      for(let r=1;r<rows.length;r++){
        const obj = {};
        for(let c=0;c<header.length;c++){
          obj[header[c]] = (rows[r][c] ?? "").trim();
        }
        out.push(obj);
      }
      return out;
    }

    async function loadQuestions(dataPath){
      const url = `${dataPath}?${CACHE_BUST}`;
      const res = await fetch(url);
      if(!res.ok) throw new Error("Failed to load data: " + url);
      const text = await res.text();
      const items = parseCSV(text);

      // Map (keep your columns as-is)
      return items.map(x => ({
        id: x.id || "",
        q_type: x.q_type || "",
        q_text: x.q_text || "",
        choices_text: x.choices_text || "",
        answer_text: x.answer_text || "",
        hint_text: x.hint_text || "",
        img: x.img || "",
        audio: x.audio || "",
        reorder_text: x.reorder_text || "",
      })).filter(q => q.q_text);
    }

    // ========= State =========
    let questions = [];
    let idx = 0;
    let score = 0;

    // Track wrong answers (for review/loop flows if you use it)
    const wrongIds = new Set();

    // ========= UI render =========
    function updateHeader(){
      $("counter").textContent = `${Math.min(idx+1, questions.length)}/${questions.length}`;
      $("score").textContent = String(score);
    }

    function clearBlocks(){
      $("choices").style.display = "none";
      $("choices").innerHTML = "";
      $("inputArea").style.display = "none";
      $("hint").innerHTML = "";
      $("media").innerHTML = "";
      $("debug").textContent = "";
    }

    function renderMedia(q){
      const media = $("media");
      media.innerHTML = "";
      if(q.img){
        const img = document.createElement("img");
        img.src = q.img;
        img.alt = "quiz image";
        img.addEventListener("error", ()=> img.remove());
        media.appendChild(img);
      }
    }

    function render(){
      updateHeader();
      clearBlocks();

      const q = questions[idx];
      $("qText").textContent = q.q_text || "";

      $("setTitle").textContent = getParam("title") || "Quiz";
      $("qTypeLabel").textContent = q.q_type ? `type: ${q.q_type}` : "";

      renderMedia(q);

      const hint = (q.hint_text || "").trim();
      if(hint){
        $("hint").innerHTML = `Hint: <span class="ans">${escapeHtml(hint)}</span>`;
      }

      if(q.q_type === "q_type_6_input"){
        renderInput(q);
        return;
      }

      // Default: MCQ / other types you already had
      renderChoices(q);
    }

    function renderChoices(q){
      const box = $("choices");
      box.style.display = "grid";

      const parts = (q.choices_text || "")
        .split("|")
        .map(s => (s ?? "").trim())
        .filter(Boolean);

      // If no choices, fallback to input
      if(!parts.length){
        renderInput(q);
        return;
      }

      // Render each choice
      for(const p of parts){
        const div = document.createElement("div");
        div.className = "choice";

        // If you store "JP||EN" style, split (optional)
        const seg = p.split("||").map(s=>s.trim());
        const jp = seg[0] ?? p;
        const en = seg[1] ?? "";

        const jpEl = document.createElement("div");
        jpEl.className = "jp";
        jpEl.textContent = jp;

        div.appendChild(jpEl);

        if(en){
          const enEl = document.createElement("div");
          enEl.className = "en";
          enEl.textContent = en;
          div.appendChild(enEl);
        }

        div.addEventListener("click", ()=> onPickChoice(q, p));
        box.appendChild(div);
      }
    }

    function onPickChoice(q, pickedRaw){
      const picked = normalizeLoose(pickedRaw);
      const ans = normalizeLoose(q.answer_text);

      const ok = (picked && ans && picked === ans);

      if(ok){
        score++;
        playSfxByName("correct");
        showToast("✅ Correct!", true);
      }else{
        wrongIds.add(q.id || `${idx}`);
        playSfxByName("wrong");
        showToast("❌ Wrong", false);
      }

      $("score").textContent = String(score);
      setTimeout(next, 520);
    }

    function renderInput(q){
      $("inputArea").style.display = "block";
      $("choices").style.display = "none";

      $("inputField").value = "";
      $("inputField").focus();
    }

    // ========= Input check (PATCHED: long vowels + macrons) =========
    function markCorrect(){
      score++;
      playSfxByName("correct");
      showToast("✅ Correct!", true);
      $("score").textContent = String(score);
      setTimeout(next, 520);
    }

    function markWrong(){
      const q = questions[idx];
      wrongIds.add(q.id || `${idx}`);
      playSfxByName("wrong");
      showToast("❌ Wrong", false);
    }

    function checkInput(q){
  const raw = document.getElementById("inputField").value;
  const val = (raw ?? "").trim();
  if(!val) return;

  const parts = (q.choices_text || "")
    .split("|")
    .map(s => (s ?? "").trim())
    .filter(Boolean);

  const valLower = val.toLowerCase();

  // 1) Exact match (kana/kanji/romaji) — choices_text にあるものは全部正解にする
  if(parts.some(p => p.toLowerCase() === valLower)){
    markCorrect();
    return;
  }

  // 2) Romaji long-vowel rules (q_type_6_input)
  //    - Accept macron versions as correct ONLY if they correspond to the same "PC romaji -> kana" style variant present in choices_text
  //    - i.e. if choices has "oo" then ō can mean "oo"; if choices has "ou" then ō can mean "ou"
  //    - same for ē: "ee" / "ei"
  const isRomajiLike = (s) => /^[a-zāīūēō]+$/i.test(s);

  const detectFlagsFromParts = () => {
    let allowOo = false, allowOu = false, allowEe = false, allowEi = false;

    for(const p of parts){
      const pl = p.toLowerCase();
      if(!isRomajiLike(pl)) continue;

      // Note: we only detect explicit sequences (oo/ou/ee/ei) from existing roman forms in choices_text.
      // If none are present, we allow both as a fallback.
      if(pl.includes("oo")) allowOo = true;
      if(pl.includes("ou")) allowOu = true;
      if(pl.includes("ee")) allowEe = true;
      if(pl.includes("ei")) allowEi = true;
    }

    return {
      o: (allowOo || allowOu) ? [
        ...(allowOo ? ["oo"] : []),
        ...(allowOu ? ["ou"] : []),
      ] : ["oo","ou"],
      e: (allowEe || allowEi) ? [
        ...(allowEe ? ["ee"] : []),
        ...(allowEi ? ["ei"] : []),
      ] : ["ee","ei"],
    };
  };

  const FLAGS = detectFlagsFromParts();

  const expandMacrons = (s) => {
    const t = (s ?? "").toLowerCase().replace(/\s+/g, "");
    const hasMacron = /[āīūēō]/.test(t);
    if(!hasMacron) return [t];

    // Use placeholders then expand (ō/ē can be ambiguous)
    const ph = t
      .replace(/ā/g, "{A}")
      .replace(/ī/g, "{I}")
      .replace(/ū/g, "{U}")
      .replace(/ē/g, "{E}")
      .replace(/ō/g, "{O}");

    let acc = [ph];

    const expandToken = (token, reps) => {
      const next = [];
      for(const s0 of acc){
        if(!s0.includes(token)){ next.push(s0); continue; }
        for(const rep of reps){
          next.push(s0.split(token).join(rep));
        }
      }
      acc = next;
    };

    expandToken("{A}", ["aa"]);
    expandToken("{I}", ["ii"]);
    expandToken("{U}", ["uu"]);
    expandToken("{E}", FLAGS.e);
    expandToken("{O}", FLAGS.o);

    return acc;
  };

  // Build acceptable romaji set (expanded to plain romaji)
  const acceptableRomaji = new Set();
  for(const p of parts){
    const pl = p.toLowerCase();
    if(!isRomajiLike(pl)) continue;
    for(const ex of expandMacrons(pl)){
      acceptableRomaji.add(ex);
    }
  }

  // Check user input romaji against acceptable romaji variants
  if(isRomajiLike(valLower) && acceptableRomaji.size){
    for(const ex of expandMacrons(valLower)){
      if(acceptableRomaji.has(ex)){
        markCorrect();
        return;
      }
    }
  }

  // Not matched
  markWrong();
}

    // ========= Navigation =========
    function next(){
      idx++;
      if(idx >= questions.length){
        finish();
      }else{
        render();
      }
    }

    function finish(){
      const setId = getParam("setId") || "quiz";
      localStorage.setItem(KEY_SET_ID, setId);
      localStorage.setItem(KEY_SCORE, String(score));
      localStorage.setItem(KEY_TOTAL, String(questions.length));

      playSfxByName("done");
      setTimeout(()=>{ location.href = RESULT_URL; }, 650);
    }

    // ========= Wire up =========
    $("checkInputBtn").addEventListener("click", ()=> checkInput(questions[idx]));
    $("skipBtn").addEventListener("click", ()=> next());

    $("inputField").addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        checkInput(questions[idx]);
      }
    });

    $("exitBtn").addEventListener("click", ()=>{
      if(confirm("Exit the quiz?")){
        location.href = "menu.html";
      }
    });

    // ========= Boot =========
    (async function boot(){
      try{
        const dataPath = getParam("data") || DEFAULT_DATA_PATH;
        questions = await loadQuestions(dataPath);

        if(!questions.length){
          $("qText").textContent = "No questions found.";
          return;
        }

        idx = 0;
        score = 0;
        render();
      }catch(err){
        $("qText").textContent = "Failed to load quiz data.";
        $("debug").textContent = String(err);
      }
    })();
  </script>
</body>
</html>

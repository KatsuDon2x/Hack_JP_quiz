<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --lime:#C8FF2E;

      --panel-bg: #162c40;          /* solid = crisp */
      --panel-border: rgba(255,255,255,.18);
      --darkbar: rgba(45,45,45,.92);
    }

    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      padding-bottom:160px;
    }

    /* ===== top area ===== */
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:4px;
      flex-wrap:wrap;
    }
    .leftTop{ display:flex; align-items:center; gap:10px; }
    .btnImg{
      display:block;
      height:auto;
      cursor:pointer;
      user-select:none;
      -webkit-user-drag:none;
    }
    .exitBtn{ width:50px; }

    .statusRow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .statusPill{
      background:#fff;
      color:#000;
      border-radius:14px;
      padding:8px 12px;
      font-size:14px;
      font-weight:900;
      min-width:110px;
      text-align:center;
    }

    .uiToggle{
      display:flex;
      gap:8px;
      align-items:center;
      background:var(--lime);
      border-radius:14px;
      padding:6px;
    }
    .uiPill{
      padding:8px 10px;
      border-radius:12px;
      font-size:13px;
      font-weight:900;
      color:#000;
      opacity:.45;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .uiPill.on{ opacity:1; background:rgba(0,0,0,.12); }

    /* ===== instruction ===== */
    .inst{
      display:flex;
      align-items:center;
      gap:12px;
      margin:14px 0 10px;
    }
    .audioBtn{ width:72px; }
    .instText{
      font-size:16px;
      color:var(--fg);
      line-height:1.4;
    }

    /* ===== prompt sizes ===== */
    .promptBox{ margin:10px 0 12px; }

    .promptJa{
      font-size:27px;      /* main +20% */
      line-height:1.45;
      margin:0 0 6px;
      font-weight:450;
    }
    .promptJa ruby{ ruby-position: over; }
    .promptJa rt{
      font-size:0.80em;    /* ruby ~+50% clearer */
      opacity:0.92;
      letter-spacing:0.02em;
    }
    .promptEn{
      font-size:14px;
      line-height:1.5;
      margin:0;
      color:rgba(255,255,255,.82);
    }

    /* ===== images ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px;
      margin:10px 0 14px;
    }
    .imgCard{
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }
    .imgCard img{
      width:100%;
      height:auto;
      display:block;
    }

    /* ===== choices ===== */
    .choices{ margin-top:6px; display:grid; gap:10px; }
    .choices.twoCol{ grid-template-columns: 1fr 1fr; }

    .choiceBtn{
      text-align:left;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      cursor:pointer;
      font-weight:600;
      font-size:16px;
      line-height:1.35;
      transition: background .12s ease, border-color .12s ease, color .12s ease;
    }
    .choiceBtn.active{
      background:var(--lime);
      border-color:rgba(0,0,0,.25);
      color:#000;
      font-weight:900;
    }

    /* ===== bottom bar ===== */
    .bottomBar{
      position:fixed;
      left:0; right:0; bottom:16px;
      display:flex;
      justify-content:center;
      z-index:40;
      pointer-events:none;
    }
    .bottomInner{
      width:min(980px, calc(100% - 28px));
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }

    /* check button +20% */
    .checkBtn{ width:216px; pointer-events:auto; }

    .rightActions{
      display:flex;
      gap:10px;
      align-items:flex-end;
      pointer-events:auto;

    }
    .qa{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.55);
      cursor:pointer;
      user-select:none;
      font-size:15px;
      color:var(--fg);
      white-space:nowrap;
    }
    .qa.save{ opacity:.35; }
    .qa.save.on{ opacity:1; }
    .qa .sub{ font-size:12px; color:var(--muted); }

    .qa.disabled{
      opacity:.28;
      pointer-events:none;
      filter: grayscale(1);
    }

    /* ===== Exit confirm bar (FIXED: smaller + side-by-side) ===== */
    .exitBar{
      position:fixed;
      left:0; right:0;
      top:0;
      z-index:80;
      display:flex;
      justify-content:center;
      pointer-events:none;
      transform: translateY(-120%);
      transition: transform .18s ease;
    }
    .exitBar.show{ transform: translateY(0); }

    .exitBarInner{
      width:min(980px, calc(100% - 28px));
      background:var(--darkbar);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      margin-top:10px;
      padding:12px;
      display:flex;
      flex-direction:row;          /* side-by-side */
      justify-content: space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;              /* small window => stack */
      pointer-events:auto;
    }
    .exitBtnImg{
      width:min(140px, 30vw);      /* smaller */
      max-width:260px;
    }

    /* ===== Result overlay (CRISP) ===== */
    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-start;
      justify-content:center;
      padding-top:36px;
      z-index:60;
    }
    .overlay.show{ display:flex; }

    .panel{
      width:min(980px, calc(100% - 28px));
      border-radius:18px;
      border:1px solid var(--panel-border);
      background:var(--panel-bg);
      padding:16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      transform: translateY(-16px);
      opacity: 0;
      transition: transform .18s ease, opacity .18s ease;
    }
    .overlay.show .panel{
      transform: translateY(0);
      opacity: 1;
    }

    .panelTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
    }

    .resultMsg{
      width:min(520px, 82vw);
      height:auto;
      display:block;
      margin:10px 0 14px;
    }

    @keyframes popIn {
      0%   { transform: scale(.92); opacity: .0; }
      60%  { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(1); }
    }
    .overlay.show .resultMsg{
      animation: popIn .22s ease both;
    }

    .panelBtns{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
    }
    .continueBtn{ width:220px; }

    .panelMini{
      display:flex;
      gap:18px;
      align-items:center;
      font-size:18px;
    }
    .panelMini .saved{
      opacity:.35;
      cursor:pointer;
      user-select:none;
    }
    .panelMini .saved.on{ opacity:1; }

    /* ===== Script bottom sheet ===== */
    .sheet{
      position:fixed;
      left:0; right:0;
      bottom:-110%;
      background: rgba(40, 80, 50, .72);
      border-top:3px solid var(--lime);
      box-shadow: 0 -16px 40px rgba(0,0,0,.55);
      transition: bottom .18s ease;
      z-index:70;
      padding:14px;
    }
    .sheet.show{ bottom:0; }

    .sheetInner{ max-width:980px; margin:0 auto; }
    .sheetTop{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

    .cols{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
    .cols.oneCol{ grid-template-columns: 1fr; }

    .col{
      border:1px solid rgba(200,255,46,.32);
      border-radius:14px;
      padding:12px;
      background: rgba(200,255,46,.16);
      white-space:pre-wrap;
      max-height: 46vh;
      overflow:auto;
    }

    #scriptJa{ font-size:27px; line-height:1.45; font-weight:400; }
    #scriptJa rt{ font-size:0.80em; opacity:0.92; }
    #scriptEn{ font-size:14px; line-height:1.5; color:rgba(255,255,255,.85); }

    .hidden{ display:none !important; }

    @media (max-width:520px){
      .exitBtn{ width:78px; }
      .audioBtn{ width:64px; }
      .checkBtn{ width:208px; }
      .promptJa{ font-size:25px; }
      #scriptJa{ font-size:25px; }
      .cols{ grid-template-columns: 1fr; }
    }
  /* ===== mini-markup styles ===== */
.thick{ font-weight:1900; letter-spacing:.02em; }

.mk-hl{ background:rgba(255,255,0,.25); padding:0 .22em; border-radius:.28em; }
.mk-big{ font-size:1.22em; font-weight:900; }
.mk-small{ font-size:.86em; opacity:.98; }
.mk-i{ font-style:italic; }
u{ text-underline-offset: .18em; }

/* ===== Keep-going modal (after Round 1 if mistakes exist) ===== */
.keepGoing{
  position:fixed; inset:0;
  display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.9);
  z-index:120;
  padding:18px;
}
.keepGoing.show{ display:flex; }
.keepGoing img{
  width:min(520px, 86vw);
  height:auto;
  user-select:none;
  -webkit-user-drag:none;
}
.keepFallback{
  width:min(520px, 86vw);
  padding:18px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  text-align:center;
}
.keepFallback .main{ font-size:30px; font-weight:900; margin:4px 0 6px; }
.keepFallback .rb{ font-size:14px; opacity:.85; margin-bottom:6px; }
.keepFallback .en{ font-size:14px; opacity:.85; }
</style>
</head>

<body>

<script>
/* =========================================================
   Quiz (GitHub-friendly, no user CSV upload)
   - Loads questions.csv / sets.csv / ui_text.csv via fetch()
   - Supports input typing questions (type = input or q_type_input)
   - Keeps existing UI and result saving keys
========================================================= */

const FILES = {
  questions: "questions.csv",
  sets: "sets.csv",
  ui: "ui_text.csv",
};

const LS = {
  LAST_SET_ID: "JPQ_LAST_SET_ID",
  LAST_SCORE: "JPQ_LAST_SCORE",
  LAST_TOTAL: "JPQ_LAST_TOTAL",
  WRONG_IDS: "JPQ_LAST_WRONG",
};

const DEFAULT_SET_FALLBACK = ""; // if empty, uses first published set in sets.csv

// ===== DOM =====
const els = {
  exitBtn: document.getElementById("exitBtn"),
  exitBar: document.getElementById("exitBar"),
  exitContinue: document.getElementById("exitContinue"),
  exitQuit: document.getElementById("exitQuit"),

  pillProgress: document.getElementById("pillProgress"),
  pillScore: document.getElementById("pillScore"),
  pillLevel: document.getElementById("pillLevel"),

  audioBtn: document.getElementById("audioBtn"),
  promptEn: document.getElementById("promptEn"),
  promptJa: document.getElementById("promptJa"),
  imgGrid: document.getElementById("imgGrid"),
  choices: document.getElementById("choices"),

  checkBtn: document.getElementById("checkBtn"),
  bottomRight: document.getElementById("bottomRight"),

  overlay: document.getElementById("overlay"),
  panelMsg: document.getElementById("panelMsg"),
  panelSub: document.getElementById("panelSub"),
  continueBtn: document.getElementById("continueBtn"),
  retryBtn: document.getElementById("retryBtn"),

  scriptPanel: document.getElementById("scriptPanel"),
  toggleScript: document.getElementById("toggleScript"),
  scriptCols: document.getElementById("scriptCols"),
  scriptJa: document.getElementById("scriptJa"),
  scriptEn: document.getElementById("scriptEn"),
};

// ===== state =====
let setId = null;
let setMeta = null;
let questions = [];
let idx = 0;

let score = 0;
let wrongIds = [];

let selectedIndex = null;
let correctIndexNow = 0;

// typing state
let typedAnswer = "";

const audio = new Audio();
audio.preload = "auto";

let uiTextMap = {}; // optional ui_text.csv

// =========================================================
// CSV loader (fetch from GitHub)
// =========================================================

function stripBOM(s){
  return s && s.charCodeAt(0) === 0xFEFF ? s.slice(1) : s;
}

function parseCSV(text){
  // Simple CSV parser with quotes support (enough for your current files)
  // Returns array of objects using header row keys.
  text = stripBOM(text || "");
  const rows = [];
  let row = [];
  let cur = "";
  let inQ = false;

  for(let i=0;i<text.length;i++){
    const ch = text[i];

    if(inQ){
      if(ch === '"'){
        const next = text[i+1];
        if(next === '"'){ cur += '"'; i++; }
        else { inQ = false; }
      }else{
        cur += ch;
      }
      continue;
    }

    if(ch === '"'){ inQ = true; continue; }
    if(ch === ","){ row.push(cur); cur=""; continue; }
    if(ch === "\n"){
      row.push(cur); cur="";
      // ignore empty trailing lines
      if(row.some(c => (c||"").trim() !== "")) rows.push(row);
      row = [];
      continue;
    }
    if(ch === "\r"){ continue; }
    cur += ch;
  }
  // last row
  if(cur.length || row.length){
    row.push(cur);
    if(row.some(c => (c||"").trim() !== "")) rows.push(row);
  }
  if(rows.length === 0) return [];

  const header = rows[0].map(h => (h||"").trim());
  const out = [];
  for(let r=1;r<rows.length;r++){
    const obj = {};
    for(let c=0;c<header.length;c++){
      obj[header[c]] = (rows[r][c] ?? "").trim();
    }
    out.push(obj);
  }
  return out;
}

async function fetchCSV(path){
  const res = await fetch(path, { cache: "no-store" });
  if(!res.ok){
    throw new Error(`Failed to fetch ${path} (${res.status})`);
  }
  const txt = await res.text();
  return parseCSV(txt);
}

// =========================================================
// UI text helper
// =========================================================
function buildUiTextMap(rows){
  const map = {};
  for(const r of rows){
    const k = (r.key || r.id || "").trim();
    if(!k) continue;
    map[k] = r.value || r.text || "";
  }
  return map;
}
function t(key, fallback){
  return (uiTextMap && uiTextMap[key]) ? uiTextMap[key] : fallback;
}

// =========================================================
// Markup helpers (already used in your CSV)
// =========================================================
function escapeHTML(s){
  return (s||"").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

// Minimal markup: [b] [i] [u] [hl] [small] [big] [ruby]word[rt]reading[/rt][/ruby]
function miniMarkupToHTML(s){
  s = s || "";
  // ruby: [ruby]漢字[rt]かんじ[/rt][/ruby]
  // your CSV uses [ruby]... [rt]...[/rt][/ruby]
  s = s.replace(/\[ruby\]([\s\S]*?)\[rt\]([\s\S]*?)\[\/rt\]\[\/ruby\]/g, (m, a, b)=>{
    return `<ruby>${escapeHTML(a)}<rt>${escapeHTML(b)}</rt></ruby>`;
  });
  s = s.replace(/\[b\]([\s\S]*?)\[\/b\]/g, "<b>$1</b>");
  s = s.replace(/\[i\]([\s\S]*?)\[\/i\]/g, "<i>$1</i>");
  s = s.replace(/\[u\]([\s\S]*?)\[\/u\]/g, "<u>$1</u>");
  s = s.replace(/\[hl\]([\s\S]*?)\[\/hl\]/g, `<span class="hl">$1</span>`);
  s = s.replace(/\[small\]([\s\S]*?)\[\/small\]/g, `<span class="small">$1</span>`);
  s = s.replace(/\[big\]([\s\S]*?)\[\/big\]/g, `<span class="big">$1</span>`);
  return s;
}

// =========================================================
// Shuffle helper
// =========================================================
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// =========================================================
// Typing question helpers
// =========================================================
function isInputQuestion(q){
  const raw = String((q.type || q.q_type || "")).trim().toLowerCase();
  return raw === "input" || raw === "q_type_input" || raw === "typing" || raw === "type_input";
}

function kataToHira(str){
  return (str || "").replace(/[\u30A1-\u30F6]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0x60)
  );
}
function normalizeKana(str){
  return kataToHira((str||"").trim());
}
function normalizeRomaji(str){
  let out = (str||"").trim().toLowerCase().replace(/\s+/g,"").replace(/'/g,"");
  // macron -> double vowels
  out = out.replace(/ā/g,"aa").replace(/ī/g,"ii").replace(/ū/g,"uu").replace(/ē/g,"ee").replace(/ō/g,"oo");
  // handle combining macron just in case
  out = out.replace(/ā/g,"aa").replace(/ī/g,"ii").replace(/ū/g,"uu").replace(/ē/g,"ee").replace(/ō/g,"oo");
  return out;
}
function isKanaLike(str){
  return /[\u3040-\u30FF]/.test(str || "");
}
function acceptPartial(user, target){
  if(!user || user.length < 2) return false;
  return target.includes(user);
}

function extractBracketAnswer(promptJa){
  // If your prompt uses: ... [もとに] ...
  const m = String(promptJa||"").match(/\[([^\]]+)\]/);
  return m ? m[1].trim() : "";
}

function getAcceptedAnswers(q){
  // Preferred: answer_text column (pipe separated)
  const raw = (q.answer_text || "").split("|").map(s=>s.trim()).filter(Boolean);
  if(raw.length) return raw;

  // Fallback: bracketed answer in prompt_ja
  const br = extractBracketAnswer(q.prompt_ja);
  if(br) return [br];

  return [];
}

function checkTyped(q, userRaw){
  const accepted = getAcceptedAnswers(q);
  if(!accepted.length) return false;

  const uRaw = (userRaw || "").trim();
  if(!uRaw) return false;

  // If user typed kana, normalize kana both sides
  if(isKanaLike(uRaw)){
    const u = normalizeKana(uRaw);
    const targets = accepted.map(a => normalizeKana(a));
    return targets.some(t => u === t || acceptPartial(u, t));
  }else{
    const u = normalizeRomaji(uRaw);
    const targets = accepted.map(a => normalizeRomaji(a));
    return targets.some(t => u === t || acceptPartial(u, t));
  }
}

// =========================================================
// Rendering
// =========================================================
function render(){
  const q = questions[idx];

  // progress + score
  els.pillProgress.textContent = `${idx+1} / ${questions.length}`;
  els.pillScore.textContent = `Score: ${score}`;

  // level pill
  const lvl = (setMeta?.level_jlpt || setMeta?.level_cefr || "").trim();
  els.pillLevel.textContent = lvl ? lvl : "—";

  // prompts
  els.promptEn.textContent = q.prompt_en || "";
  els.promptJa.innerHTML = miniMarkupToHTML(q.prompt_ja || "");

  // audio
  if(q.audio_file){
    audio.src = q.audio_file;
    els.audioBtn.style.opacity = "1";
    els.audioBtn.style.pointerEvents = "auto";
  }else{
    audio.src = "";
    els.audioBtn.style.opacity = ".35";
    els.audioBtn.style.pointerEvents = "none";
  }

  // images
  renderImages(q);

  // choices / typing
  renderChoicesOrTyping(q);

  // scripts
  renderScripts(q);
}

function renderImages(q){
  els.imgGrid.innerHTML = "";
  const imgs = (q.image_files || "").split("|").map(s=>s.trim()).filter(Boolean);
  if(!imgs.length){
    els.imgGrid.style.display = "none";
    return;
  }
  els.imgGrid.style.display = "";
  imgs.forEach(src=>{
    const img = document.createElement("img");
    img.className = "qimg";
    img.src = src;
    img.alt = "";
    els.imgGrid.appendChild(img);
  });
}

function renderScripts(q){
  const ja = (q.script_ja || "").trim();
  const en = (q.script_en || "").trim();

  // Show panel only if there's any script content
  if(!ja && !en){
    els.scriptPanel.style.display = "none";
    return;
  }
  els.scriptPanel.style.display = "";

  els.scriptJa.innerHTML = miniMarkupToHTML(ja || "");
  els.scriptEn.innerHTML = miniMarkupToHTML(en || "");
}

// ---- choices or typing ----
function renderChoicesOrTyping(q){
  // reset
  selectedIndex = null;
  typedAnswer = "";

  if(isInputQuestion(q)){
    renderTyping(q);
    return;
  }
  renderMCQ(q);
}

function renderTyping(q){
  const wrap = els.choices;
  wrap.classList.remove("twoCol");
  wrap.innerHTML = "";

  const box = document.createElement("div");
  box.style.display = "grid";
  box.style.gap = "10px";

  const input = document.createElement("input");
  input.type = "text";
  input.id = "typeAnswer";
  input.autocomplete = "off";
  input.autocapitalize = "none";
  input.spellcheck = false;
  input.placeholder = "Type here (かな / カナ / romaji)";
  input.style.width = "100%";
  input.style.boxSizing = "border-box";
  input.style.padding = "14px 14px";
  input.style.borderRadius = "14px";
  input.style.border = "1px solid rgba(255,255,255,.18)";
  input.style.background = "rgba(255,255,255,.06)";
  input.style.color = "white";
  input.style.fontSize = "16px";
  input.style.outline = "none";

  const hint = document.createElement("div");
  hint.style.fontSize = "12px";
  hint.style.color = "rgba(255,255,255,.62)";

  const acc = getAcceptedAnswers(q);
  const hasMacronExample = acc.some(a => /[āīūēō]/.test(a));
  hint.innerHTML = `Kana or romaji OK. ${hasMacronExample ? "Macron OK (ōkī)." : "Romaji OK (ookii)."} Partial OK (min 2 chars).`;

  input.addEventListener("input", ()=>{ typedAnswer = input.value; });
  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){
      e.preventDefault();
      els.checkBtn.click();
    }
  });

  box.appendChild(input);
  box.appendChild(hint);
  wrap.appendChild(box);

  setTimeout(()=>input.focus(), 60);
}

function renderMCQ(q){
  const wrap = els.choices;
  wrap.innerHTML = "";

  const rawParts = (q.choices_text || "").split("|").map(v => v.trim()).filter(Boolean);
  const pairs = rawParts.map((text, origIdx) => ({ text, origIdx }));

  // Shuffle unless it's q_type_1_listen_only (your "type 1")
  const qt = String((q.type || q.q_type || "")).trim().toLowerCase();
  const noShuffle = (qt === "q_type_1_listen_only");

  const shown = noShuffle ? pairs : shuffle(pairs);

  // Answer index: support 0-based and 1-based
  let correctOrig = parseInt(q.answer_index || "0", 10);
  if(!Number.isFinite(correctOrig)) correctOrig = 0;
  // if looks 1-based (>=1) and within range -> convert to 0-based
  if(correctOrig >= 1 && correctOrig <= pairs.length && String(q.answer_index).trim() !== "0"){
    correctOrig = correctOrig - 1;
  }
  correctIndexNow = shown.findIndex(p => p.origIdx === correctOrig);
  if(correctIndexNow < 0) correctIndexNow = 0;

  const long = shown.some(p => (p.text || "").length > 22);
  wrap.classList.toggle("twoCol", !long);

  shown.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "choiceBtn";
    b.innerHTML = miniMarkupToHTML(p.text);
    b.addEventListener("click", () => {
      selectedIndex = i;
      [...wrap.children].forEach(el => el.classList.remove("active"));
      b.classList.add("active");
    });
    wrap.appendChild(b);
  });
}

// =========================================================
// Overlay feedback
// =========================================================
function showOverlay(ok, msg, sub){
  els.panelMsg.textContent = msg;
  els.panelSub.textContent = sub || "";
  els.overlay.classList.add("show");

  // visual hint: which is "primary"
  els.continueBtn.style.opacity = ok ? "1" : ".65";
  els.retryBtn.style.opacity = ok ? ".65" : "1";
}
function hideOverlay(){
  els.overlay.classList.remove("show");
}

// =========================================================
// Flow
// =========================================================
function playAudio(){
  if(!audio.src) return;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

function finish(){
  localStorage.setItem(LS.LAST_SET_ID, setId);
  localStorage.setItem(LS.LAST_TOTAL, String(questions.length));
  const pct = Math.round((score / questions.length) * 100);
  localStorage.setItem(LS.LAST_SCORE, String(pct));
  localStorage.setItem(LS.WRONG_IDS, JSON.stringify(wrongIds));

  location.href = "result.html";
}

function next(){
  hideOverlay();
  idx += 1;
  if(idx >= questions.length){
    finish();
    return;
  }
  render();
  playAudio();
}

function retry(){
  hideOverlay();
  // for typing, re-focus
  const inp = document.getElementById("typeAnswer");
  if(inp) inp.focus();
  playAudio();
}

// =========================================================
// Event wiring
// =========================================================
els.audioBtn.addEventListener("click", playAudio);

els.checkBtn.addEventListener("click", ()=>{
  const q = questions[idx];

  let ok = false;
  if(isInputQuestion(q)){
    ok = checkTyped(q, typedAnswer);
  }else{
    ok = (selectedIndex !== null) && (selectedIndex === correctIndexNow);
  }

  if(ok){
    score += 1;
    showOverlay(true, "Correct ✅", "Nice! Continue.");
  }else{
    wrongIds.push(q.question_id || String(idx));
    showOverlay(false, "Almost 💡", "Try again, or Continue to move on.");
  }

  // update score pill immediately
  els.pillScore.textContent = `Score: ${score}`;
});

els.continueBtn.addEventListener("click", next);
els.retryBtn.addEventListener("click", retry);

// Exit confirm
els.exitBtn.addEventListener("click", ()=> els.exitBar.classList.add("show"));
els.exitContinue.addEventListener("click", ()=> els.exitBar.classList.remove("show"));
els.exitQuit.addEventListener("click", ()=> location.href = "menu.html");

// Script toggle glow
els.toggleScript.addEventListener("click", ()=>{
  const expanded = els.scriptPanel.classList.toggle("expanded");
  if(expanded){
    els.toggleScript.classList.add("glow");
  }else{
    els.toggleScript.classList.remove("glow");
  }
});

// =========================================================
// Boot: choose setId and load CSV
// =========================================================
function getParam(name){
  const url = new URL(location.href);
  return url.searchParams.get(name);
}

async function boot(){
  try{
    const [setsRows, qRows] = await Promise.all([
      fetchCSV(FILES.sets),
      fetchCSV(FILES.questions),
    ]);

    // ui_text is optional
    try{
      const uiRows = await fetchCSV(FILES.ui);
      uiTextMap = buildUiTextMap(uiRows);
    }catch(_e){
      uiTextMap = {};
    }

    const requested = getParam("set") || getParam("set_id");
    const last = localStorage.getItem(LS.LAST_SET_ID) || "";
    const fallback = DEFAULT_SET_FALLBACK || last || requested || "";

    // Choose set:
    // 1) URL param if present
    // 2) last played
    // 3) first published
    const published = setsRows.filter(s => String(s.is_published||"").trim() === "1");
    const firstPublished = published[0]?.set_id || setsRows[0]?.set_id || "";

    setId = requested || last || fallback || firstPublished || "";
    if(!setId){
      alert("No set_id found. Please add sets.csv and questions.csv to the repo.");
      location.href = "menu.html";
      return;
    }

    setMeta = setsRows.find(s => s.set_id === setId) || null;

    // Filter questions for this set
    questions = qRows.filter(q => q.set_id === setId);

    // If you want exactly 10 questions: choose the first 10 (or shuffle then take 10)
    // For typing practice you said "10 questions each set".
    // We'll take first 10 in file order.
    if(questions.length > 10) questions = questions.slice(0, 10);

    if(questions.length === 0){
      alert(`No questions found for set_id: ${setId}`);
      location.href = "menu.html";
      return;
    }

    // Reset
    idx = 0;
    score = 0;
    wrongIds = [];

    // Render first
    render();
    playAudio();

  }catch(e){
    console.error(e);
    alert("Could not load CSV from GitHub. Make sure questions.csv and sets.csv are in the same folder as quiz.html.");
    location.href = "menu.html";
  }
}

boot();
</script>

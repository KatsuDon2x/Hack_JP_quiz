<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --lime:#C8FF2E;

      --panel-bg: #162c40;          /* solid = crisp */
      --panel-border: rgba(255,255,255,.18);
      --darkbar: rgba(45,45,45,.92);
    }

    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      padding-bottom:160px;
    }

    /* ===== top area ===== */
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:4px;
      flex-wrap:wrap;
    }
    .leftTop{ display:flex; align-items:center; gap:10px; }
    .btnImg{
      display:block;
      height:auto;
      cursor:pointer;
      user-select:none;
      -webkit-user-drag:none;
    }
    .exitBtn{ width:50px; }

    .statusRow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .statusPill{
      background:#fff;
      color:#000;
      border-radius:14px;
      padding:8px 12px;
      font-size:14px;
      font-weight:900;
      min-width:110px;
      text-align:center;
    }

    .uiToggle{
      display:flex;
      gap:8px;
      align-items:center;
      background:var(--lime);
      border-radius:14px;
      padding:6px;
    }
    .uiPill{
      padding:8px 10px;
      border-radius:12px;
      font-size:13px;
      font-weight:900;
      color:#000;
      opacity:.45;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .uiPill.on{ opacity:1; background:rgba(0,0,0,.12); }

    /* ===== instruction ===== */
    .inst{
      display:flex;
      align-items:center;
      gap:12px;
      margin:14px 0 10px;
    }
    .audioBtn{ width:72px; }
    .instText{
      font-size:16px;
      color:var(--fg);
      line-height:1.4;
    }

    /* ===== prompt sizes ===== */
    .promptBox{ margin:10px 0 12px; }

    .promptJa{
      font-size:27px;      /* main +20% */
      line-height:1.45;
      margin:0 0 6px;
      font-weight:450;
    }
    .promptJa ruby{ ruby-position: over; }
    .promptJa rt{
      font-size:0.80em;    /* ruby ~+50% clearer */
      opacity:0.92;
      letter-spacing:0.02em;
    }
    .promptEn{
      font-size:14px;
      line-height:1.5;
      margin:0;
      color:rgba(255,255,255,.82);
    }

    /* ===== images ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px;
      margin:10px 0 14px;
    }
    .imgCard{
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }
    .imgCard img{
      width:100%;
      height:auto;
      display:block;
    }

    /* ===== choices ===== */
    .choices{ margin-top:6px; display:grid; gap:10px; }
    .choices.twoCol{ grid-template-columns: 1fr 1fr; }

    .choiceBtn{
      text-align:left;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      cursor:pointer;
      font-weight:600;
      font-size:16px;
      line-height:1.35;
      transition: background .12s ease, border-color .12s ease, color .12s ease;
    }
    .choiceBtn.active{
      background:var(--lime);
      border-color:rgba(0,0,0,.25);
      color:#000;
      font-weight:900;
    }

    /* ===== bottom bar ===== */
    .bottomBar{
      position:fixed;
      left:0; right:0; bottom:16px;
      display:flex;
      justify-content:center;
      z-index:40;
      pointer-events:none;
    }
    .bottomInner{
      width:min(980px, calc(100% - 28px));
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }

    /* check button +20% */
    .checkBtn{ width:216px; pointer-events:auto; }

    .rightActions{
      display:flex;
      gap:10px;
      align-items:flex-end;
      pointer-events:auto;

    }
    .qa{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.55);
      cursor:pointer;
      user-select:none;
      font-size:15px;
      color:var(--fg);
      white-space:nowrap;
    }
    .qa.save{ opacity:.35; }
    .qa.save.on{ opacity:1; }
    .qa .sub{ font-size:12px; color:var(--muted); }

    .qa.disabled{
      opacity:.28;
      pointer-events:none;
      filter: grayscale(1);
    }

    /* ===== Exit confirm bar (FIXED: smaller + side-by-side) ===== */
    .exitBar{
      position:fixed;
      left:0; right:0;
      top:0;
      z-index:80;
      display:flex;
      justify-content:center;
      pointer-events:none;
      transform: translateY(-120%);
      transition: transform .18s ease;
    }
    .exitBar.show{ transform: translateY(0); }

    .exitBarInner{
      width:min(980px, calc(100% - 28px));
      background:var(--darkbar);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      margin-top:10px;
      padding:12px;
      display:flex;
      flex-direction:row;          /* side-by-side */
      justify-content: space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;              /* small window => stack */
      pointer-events:auto;
    }
    .exitBtnImg{
      width:min(140px, 30vw);      /* smaller */
      max-width:260px;
    }

    /* ===== Result overlay (CRISP) ===== */
    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-start;
      justify-content:center;
      padding-top:36px;
      z-index:60;
    }
    .overlay.show{ display:flex; }

    .panel{
      width:min(980px, calc(100% - 28px));
      border-radius:18px;
      border:1px solid var(--panel-border);
      background:var(--panel-bg);
      padding:16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      transform: translateY(-16px);
      opacity: 0;
      transition: transform .18s ease, opacity .18s ease;
    }
    .overlay.show .panel{
      transform: translateY(0);
      opacity: 1;
    }

    .panelTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
    }

    .resultMsg{
      width:min(520px, 82vw);
      height:auto;
      display:block;
      margin:10px 0 14px;
    }

    @keyframes popIn {
      0%   { transform: scale(.92); opacity: .0; }
      60%  { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(1); }
    }
    .overlay.show .resultMsg{
      animation: popIn .22s ease both;
    }

    .panelBtns{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
    }
    .continueBtn{ width:220px; }

    .panelMini{
      display:flex;
      gap:18px;
      align-items:center;
      font-size:18px;
    }
    .panelMini .saved{
      opacity:.35;
      cursor:pointer;
      user-select:none;
    }
    .panelMini .saved.on{ opacity:1; }

    /* ===== Script bottom sheet ===== */
    .sheet{
      position:fixed;
      left:0; right:0;
      bottom:-110%;
      background: rgba(40, 80, 50, .72);
      border-top:3px solid var(--lime);
      box-shadow: 0 -16px 40px rgba(0,0,0,.55);
      transition: bottom .18s ease;
      z-index:70;
      padding:14px;
    }
    .sheet.show{ bottom:0; }

    .sheetInner{ max-width:980px; margin:0 auto; }
    .sheetTop{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

    .cols{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
    .cols.oneCol{ grid-template-columns: 1fr; }

    .col{
      border:1px solid rgba(200,255,46,.32);
      border-radius:14px;
      padding:12px;
      background: rgba(200,255,46,.16);
      white-space:pre-wrap;
      max-height: 46vh;
      overflow:auto;
    }

    #scriptJa{ font-size:27px; line-height:1.45; font-weight:400; }
    #scriptJa rt{ font-size:0.80em; opacity:0.92; }
    #scriptEn{ font-size:14px; line-height:1.5; color:rgba(255,255,255,.85); }

    .hidden{ display:none !important; }

    @media (max-width:520px){
      .exitBtn{ width:78px; }
      .audioBtn{ width:64px; }
      .checkBtn{ width:208px; }
      .promptJa{ font-size:25px; }
      #scriptJa{ font-size:25px; }
      .cols{ grid-template-columns: 1fr; }
    }
  /* ===== mini-markup styles ===== */
.thick{ font-weight:1900; letter-spacing:.02em; }

.mk-hl{ background:rgba(255,255,0,.25); padding:0 .22em; border-radius:.28em; }
.mk-big{ font-size:1.22em; font-weight:900; }
.mk-small{ font-size:.86em; opacity:.98; }
.mk-i{ font-style:italic; }
u{ text-underline-offset: .18em; }

/* ===== Keep-going modal (after Round 1 if mistakes exist) ===== */
.keepGoing{
  position:fixed; inset:0;
  display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.9);
  z-index:120;
  padding:18px;
}
.keepGoing.show{ display:flex; }
.keepGoing img{
  width:min(520px, 86vw);
  height:auto;
  user-select:none;
  -webkit-user-drag:none;
}
.keepFallback{
  width:min(520px, 86vw);
  padding:18px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  text-align:center;
}
.keepFallback .main{ font-size:30px; font-weight:900; margin:4px 0 6px; }
.keepFallback .rb{ font-size:14px; opacity:.85; margin-bottom:6px; }
.keepFallback .en{ font-size:14px; opacity:.85; }

/* ========= New interactions (q_type_4/5/6/8) ========= */
.inputWrap{
  display:flex; gap:10px; align-items:center;
  padding:12px 10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
}
.ansInput{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--fg);
  font-size:18px;
  padding:10px 12px;
  border-radius:12px;
}
.hintPill{
  font-size:12px;
  color:rgba(255,255,255,.75);
  padding:6px 10px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  white-space:nowrap;
}

.reorderWrap{
  display:grid;
  gap:12px;
}
.reorderBank, .reorderAnswer{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
  min-height:56px;
}
.tokenBtn, .tokenChip{
  user-select:none;
  cursor:pointer;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.22);
  color:var(--fg);
  font-size:16px;
  line-height:1;
}
.tokenBtn:active{ transform:scale(.99); }
.tokenChip{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.tokenChip.dragging{ opacity:.55; }
.tokenX{
  font-size:14px;
  opacity:.8;
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  padding:2px 7px;
}

.imgToken{
  width:86px;
  height:64px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.25);
}
.imgChip{
  padding:8px;
  border-radius:14px;
}

.matchWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.matchCol{
  padding:12px 10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
  min-height:140px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.matchBtn{
  text-align:left;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.22);
  color:var(--fg);
  cursor:pointer;
  font-size:16px;
}
.matchBtn.active{
  outline:2px solid rgba(200,255,46,.9);
  box-shadow:0 0 18px rgba(200,255,46,.25);
}
.matchBtn.done{
  opacity:.55;
  pointer-events:none;
}
.pairsBox{
  margin-top:12px;
  padding:12px 10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  color:rgba(255,255,255,.85);
  font-size:14px;
}
.pairRow{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,.14);
}
.pairRow:last-child{ border-bottom:none; }

</style>
</head>

<script>
/* ========= localStorage keys for result page ========= */
const LS_LAST_SET   = "JPQ_LAST_SET_ID";
const LS_LAST_SCORE = "JPQ_LAST_SCORE";
const LS_LAST_TOTAL = "JPQ_LAST_TOTAL";

/* ========= Data source (GitHub版: always fetch from /data) ========= */
async function getCSV(kind){
  const path = (kind==="sets") ? "data/sets.csv" :
               (kind==="questions") ? "data/questions.csv" :
               "data/ui_text.csv";
  const res = await fetch(path);
  if(!res.ok) return "";
  return await res.text();
}


/* ========= CSV parser ========= */
function parseCSV(text){
  const rows=[];
  let row=[], cur="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c === '"'){
      if(inQ && n === '"'){ cur+='"'; i++; }
      else inQ=!inQ;
    } else if(c === ',' && !inQ){
      row.push(cur); cur="";
    } else if((c==='\n' || c==='\r') && !inQ){
      if(c==='\r' && n==='\n') i++;
      row.push(cur);
      if(row.some(v=>v.trim()!=="")) rows.push(row);
      row=[]; cur="";
    } else cur+=c;
  }
  row.push(cur);
  if(row.some(v=>v.trim()!=="")) rows.push(row);

  const header = rows.shift().map(h=>h.trim());
  return rows.map(r=>{
    const o={};
    header.forEach((h,idx)=>o[h]=(r[idx]??"").trim());
    return o;
  });
}

/* ========= mini markup ========= */
function decodeHTMLEntities(str){
  // Turns "&lt;b&gt;" into "<b>" so tags/markup from CSV can render
  const t = document.createElement("textarea");
  t.innerHTML = String(str ?? "");
  return t.value;
}
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}
function miniMarkupToHTML(s){
  if(!s) return "";
  // 1) decode entities first (so <b> etc works even if CSV escaped)
  let out = decodeHTMLEntities(String(s));

  // 2) allow simple tokens
  out = out.replace(/\[br\]/gi, "<br>");

  // 3) Ruby in two styles:
  //    A) [ruby]漢字[rt]かんじ[/rt][/ruby]
  //    B) <ruby>漢字<rt>かんじ</rt></ruby>  (already works after entity-decode)
  out = out.replace(/\[ruby\]([\s\S]*?)\[rt\]([\s\S]*?)\[\/rt\]\[\/ruby\]/gi, (_, rb, rt) => {
    return `<ruby>${escapeHTML(rb)}<rt>${escapeHTML(rt)}</rt></ruby>`;
  });

  // 4) lightweight “BBCode-ish” styling
  out = out.replace(/\[b\]([\s\S]*?)\[\/b\]/gi, "<b>$1</b>");
  out = out.replace(/\[i\]([\s\S]*?)\[\/i\]/gi, '<span class="mk-i">$1</span>');
  out = out.replace(/\[u\]([\s\S]*?)\[\/u\]/gi, "<u>$1</u>");
  out = out.replace(/\[hl\]([\s\S]*?)\[\/hl\]/gi, '<span class="mk-hl">$1</span>');
  out = out.replace(/\[big\]([\s\S]*?)\[\/big\]/gi, '<span class="mk-big">$1</span>');
  out = out.replace(/\[small\]([\s\S]*?)\[\/small\]/gi, '<span class="mk-small">$1</span>');
  out = out.replace(/\[thick\]([\s\S]*?)\[\/thick\]/gi, '<span class="thick">$1</span>');

  return out;
}

/* ========= UI text map ========= */
function buildUiTextMap(rows){
  const m = new Map(); // ui|type -> text
  for(const r of rows){
    const ui = (r.ui || "").trim();
    const key = (r.key || "").trim();
    const text = (r.text || "").trim();
    if(ui && key) m.set(`${ui}|${key}`, text);
  }
  return m;
}

function getQId(q, i){
  return (q.q_id || q.id || q.question_id || "").trim() || `${setId}__${i+1}`;
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ========= Answer normalization (q_type_6_input strict rules) ========= */
function isHiraganaOnly(s){
  return /^[぀-ゟー]+$/.test(s); // allow ー for completeness
}
function isKatakanaOnly(s){
  return /^[゠-ヿー]+$/.test(s);
}
function isRomajiLike(s){
  return /^[A-Za-zĀ-ſ̄\s\-']+$/.test(s); // includes macron vowels + combining macron
}
function toMacronRomaji(raw){
  if(!raw) return "";
  let s = String(raw).trim().toLowerCase();

  // Normalize combining macrons to composed where possible
  s = s.normalize("NFC");

  // Convert combining macron forms explicitly (ā etc) just in case
  s = s
    .replace(/ā/g, "ā")
    .replace(/ī/g, "ī")
    .replace(/ū/g, "ū")
    .replace(/ē/g, "ē")
    .replace(/ō/g, "ō");

  // Apply your locked long-vowel rules (PC spell -> macron)
  // NOTE: This makes ou and oo both become ō (so ikou / ikoo both match ikō)
  s = s
    .replace(/aa/g, "ā")
    .replace(/ii/g, "ī")
    .replace(/uu/g, "ū")
    .replace(/ei/g, "ē")
    .replace(/ou/g, "ō")
    .replace(/oo/g, "ō");

  // Remove spaces/hyphens (optional; if you want them strict, delete these 2 lines)
  s = s.replace(/[\s\-']/g, "");

  return s;
}
function checkInputStrict(userInput, choicesText){
  const inputRaw = String(userInput ?? "").trim();
  if(!inputRaw) return false;

  const answers = String(choicesText || "")
    .split("|")
    .map(v => String(v).trim())
    .filter(Boolean);

  // If there is at least one hiragana-only answer, accept ONLY hiragana answers (no conversion)
  const hira = answers.filter(isHiraganaOnly);
  if(hira.length){
    if(!isHiraganaOnly(inputRaw)) return false;
    return hira.includes(inputRaw);
  }

  // If there is at least one katakana-only answer, accept ONLY katakana answers (no conversion)
  const kata = answers.filter(isKatakanaOnly);
  if(kata.length){
    if(!isKatakanaOnly(inputRaw)) return false;
    return kata.includes(inputRaw);
  }

  // Otherwise treat as "kanji / mixed JP / romaji candidates"
  // 1) Exact match against any non-romaji Japanese (kanji/mixed)
  const nonRomaji = answers.filter(a => !isRomajiLike(a));
  if(nonRomaji.length){
    // strict: no kana conversion; exact only
    if(nonRomaji.includes(inputRaw)) return true;
  }

  // 2) Romaji: accept only your spellings or macron forms that normalize to the same macron string
  const romaji = answers.filter(isRomajiLike);
  if(romaji.length){
    if(!isRomajiLike(inputRaw)) return false;
    const inNorm = toMacronRomaji(inputRaw);
    return romaji.some(a => toMacronRomaji(a) === inNorm);
  }

  return false;
}

function renderReorder(q, isImage){
  const wrap = document.getElementById("choices");

    .split("|").map(v=>v.trim()).filter(Boolean);

  reorderCorrect = tokens.slice();

  const bankTokens = shuffle(tokens.map(t=>t));

  bankTokens.forEach(tok=>{

  outer.appendChild(label2);

}

function renderReorderAnswer(ansEl){
  ansEl.innerHTML = "";
  reorderAnswer.forEach((tok, i)=>{
    const chip = document.createElement("div");
    chip.className = "tokenChip";
    chip.draggable = true;
    chip.dataset.index = String(i);

    if(reorderIsImage){
      const img = document.createElement("img");
      img.src = tok;
      img.alt = "";
      img.className = "imgToken";
      chip.classList.add("imgChip");
      chip.appendChild(img);
    }else{
      chip.textContent = tok;
    }

    const x = document.createElement("span");
    x.className = "tokenX";
    x.textContent = "×";
    x.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      reorderAnswer.splice(i,1);
      renderReorderAnswer(ansEl);
    });
    chip.appendChild(x);

    // drag handlers
    chip.addEventListener("dragstart", (e)=>{
      chip.classList.add("dragging");
      e.dataTransfer.setData("text/plain", String(i));
    });
    chip.addEventListener("dragend", ()=>chip.classList.remove("dragging"));

    ansEl.appendChild(chip);
  });
}
function setupAnswerDnD(ansEl){
  ansEl.addEventListener("dragover", (e)=>{ e.preventDefault(); });
  ansEl.addEventListener("drop", (e)=>{
    e.preventDefault();
    const from = parseInt(e.dataTransfer.getData("text/plain"),10);
    if(!Number.isFinite(from)) return;

    // determine drop index by nearest chip
    const chips = [...ansEl.querySelectorAll(".tokenChip")];
    const y = e.clientY;
    let to = chips.length;
    for(let i=0;i<chips.length;i++){
      const r = chips[i].getBoundingClientRect();
      if(y < r.top + r.height/2){ to = i; break; }
    }
    if(to === from) return;

    const item = reorderAnswer.splice(from,1)[0];
    reorderAnswer.splice(to,0,item);
    renderReorderAnswer(ansEl);
  });
}

function renderMatching(q){
  const wrap = document.getElementById("choices");
  wrap.classList.remove("twoCol");
  wrap.innerHTML = "";

  // Parse pairs: left=right | left=right ...
  const parts = String(q.choices_text||"").split("|").map(v=>v.trim()).filter(Boolean);
  const pairs = [];
  parts.forEach(p=>{
    const eq = p.indexOf("=");
    if(eq>-1){
      const left = p.slice(0,eq).trim();
      const right = p.slice(eq+1).trim();
      if(left && right) pairs.push([left,right]);
    }
  });

  matchMap = new Map(pairs); // correct
  matchLeft = shuffle(pairs.map(x=>x[0]));
  matchRight = shuffle(pairs.map(x=>x[1]));
  matchPairs = new Map();
  matchPickLeft = null;

  const outer = document.createElement("div");

  const grid = document.createElement("div");
  grid.className = "matchWrap";

  const colL = document.createElement("div");
  colL.className = "matchCol";

  const colR = document.createElement("div");
  colR.className = "matchCol";

  const lTitle = document.createElement("div");
  lTitle.className = "hintPill";
  lTitle.textContent = (uiMode==="ja") ? "左を選ぶ" : "Pick left";
  colL.appendChild(lTitle);

  const rTitle = document.createElement("div");
  rTitle.className = "hintPill";
  rTitle.textContent = (uiMode==="ja") ? "右を選ぶ" : "Pick right";
  colR.appendChild(rTitle);

  matchLeft.forEach(left=>{
    const b = document.createElement("button");
    b.className = "matchBtn";
    b.type="button";
    b.textContent = left;
    b.addEventListener("click", ()=>{
      if(matchPairs.has(left)) return;
      matchPickLeft = left;
      // highlight
      [...colL.querySelectorAll(".matchBtn")].forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
    });
    colL.appendChild(b);
  });

  matchRight.forEach(right=>{
    const b = document.createElement("button");
    b.className = "matchBtn";
    b.type="button";
    b.textContent = right;
    b.addEventListener("click", ()=>{
      if(!matchPickLeft) return;
      // prevent using same right twice
      if([...matchPairs.values()].includes(right)) return;

      matchPairs.set(matchPickLeft, right);

      // mark left done
      const leftBtns = [...colL.querySelectorAll(".matchBtn")];
      leftBtns.forEach(x=>{
        if(x.textContent === matchPickLeft){
          x.classList.remove("active");
          x.classList.add("done");
        }
      });

      // mark right done
      const rightBtns = [...colR.querySelectorAll(".matchBtn")];
      rightBtns.forEach(x=>{
        if(x.textContent === right){
          x.classList.add("done");
        }
      });

      matchPickLeft = null;
      renderPairsBox(outer);
    });
    colR.appendChild(b);
  });

  grid.appendChild(colL);
  grid.appendChild(colR);
  outer.appendChild(grid);

  const pairsBox = document.createElement("div");
  pairsBox.className = "pairsBox";
  pairsBox.id = "pairsBox";
  outer.appendChild(pairsBox);

  wrap.appendChild(outer);

  renderPairsBox(outer);
}

function renderPairsBox(outer){
  const box = outer.querySelector("#pairsBox");
  if(!box) return;

  const total = matchMap.size;
  const done = matchPairs.size;

  box.innerHTML = "";
  const head = document.createElement("div");
  head.style.marginBottom = "8px";
  head.innerHTML = `<b>${(uiMode==="ja") ? "ペア" : "Pairs"}:</b> ${done}/${total}  ${(uiMode==="ja") ? "（やり直し: 左の×で削除）" : "(remove by clicking ×)"}`;
  box.appendChild(head);

  [...matchPairs.entries()].forEach(([l,r])=>{
    const row = document.createElement("div");
    row.className = "pairRow";

    const left = document.createElement("div");
    left.textContent = l;

    const right = document.createElement("div");
    right.textContent = r;

    const x = document.createElement("button");
    x.className = "tokenX";
    x.type="button";
    x.textContent = "×";
    x.addEventListener("click", ()=>{
      // unmark buttons
      matchPairs.delete(l);
      const colL = outer.querySelectorAll(".matchCol")[0];
      const colR = outer.querySelectorAll(".matchCol")[1];
      [...colL.querySelectorAll(".matchBtn")].forEach(b=>{
        if(b.textContent===l){ b.classList.remove("done"); }
      });
      [...colR.querySelectorAll(".matchBtn")].forEach(b=>{
        if(b.textContent===r){ b.classList.remove("done"); }
      });
      renderPairsBox(outer);
    });

    row.appendChild(left);
    row.appendChild(right);
    row.appendChild(x);
    box.appendChild(row);
  });
}

function renderInteractionByType(q){
  clearInteractionState();

  const t = String(q.type || q.q_type || "").trim();

  if(/^q[_-]?type[_-]?6/i.test(t) || /^qtype6/i.test(t)){
    renderInput(q);
    return;
  }
  if(/^q[_-]?type[_-]?4/i.test(t) || /^qtype4/i.test(t)){
    renderReorder(q, false);
    return;
  }
  if(/^q[_-]?type[_-]?5/i.test(t) || /^qtype5/i.test(t)){
    renderReorder(q, true);
    return;
  }
  if(/^q[_-]?type[_-]?8/i.test(t) || /^qtype8/i.test(t)){
    renderMatching(q);
    return;
  }

  // q_type_7 is MCQ logic (blank) -> renderChoices
  // q_type_1 listen-only -> renderChoices (no shuffle handled inside)
  // q_type_2/3 -> renderChoices
  renderChoicesMCQ(q);
}

function checkAnswerByType(q){
  const t = String(q.type || q.q_type || "").trim();

  if(/^q[_-]?type[_-]?6/i.test(t) || /^qtype6/i.test(t)){
    return checkInputStrict(inputEl ? inputEl.value : "", q.choices_text || "");
  }

  if(/^q[_-]?type[_-]?4/i.test(t) || /^qtype4/i.test(t)){
    if(reorderAnswer.length !== reorderCorrect.length) return false;
    for(let i=0;i<reorderCorrect.length;i++){
      if(reorderAnswer[i] !== reorderCorrect[i]) return false;
    }
    return true;
  }

  if(/^q[_-]?type[_-]?5/i.test(t) || /^qtype5/i.test(t)){
    if(reorderAnswer.length !== reorderCorrect.length) return false;
    for(let i=0;i<reorderCorrect.length;i++){
      if(reorderAnswer[i] !== reorderCorrect[i]) return false;
    }
    return true;
  }

  if(/^q[_-]?type[_-]?8/i.test(t) || /^qtype8/i.test(t)){
    if(matchPairs.size !== matchMap.size) return false;
    for(const [l,r] of matchMap.entries()){
      if(matchPairs.get(l) !== r) return false;
    }
    return true;
  }

  // default MCQ
  return (selectedIndex !== null) && (selectedIndex === correctIndexNow);
}

    card.className="imgCard";
    const img = document.createElement("img");
    img.src = src;
    img.alt = "";
    card.appendChild(img);
    grid.appendChild(card);
  }
}

function renderChoices(q){
  const wrap = document.getElementById("choices");
  wrap.innerHTML = "";
  selectedIndex = null;

  const rawParts = (q.choices_text || "").split("|").map(v => v.trim()).filter(Boolean);
  const pairs = rawParts.map((text, origIdx) => ({ text, origIdx }));

  // Detect "listen-only type 1" robustly (use either column name)
  const qtRaw = String((q.type || q.q_type || "")).trim();
  const noShuffle =
    /^1$/.test(qtRaw) ||
    /^1\b/.test(qtRaw) ||
    /^q[_-]?type[_-]?1$/i.test(qtRaw) ||
    /^qtype1$/i.test(qtRaw);

  const shown = noShuffle ? pairs : shuffle(pairs);

  // Answer index: support 0-based and 1-based CSV
  let correctOrig = parseInt(q.answer_index || "0", 10);
  if(!Number.isFinite(correctOrig)) correctOrig = 0;
  if(correctOrig >= 1 && correctOrig <= pairs.length && String(q.answer_index).trim() !== "0"){
    correctOrig = correctOrig - 1;
  }
  correctIndexNow = shown.findIndex(p => p.origIdx === correctOrig);

  const long = shown.some(p => (p.text || "").length > 22);
  wrap.classList.toggle("twoCol", !long);

  shown.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "choiceBtn";
    b.innerHTML = miniMarkupToHTML(p.text);
    b.addEventListener("click", () => {
      selectedIndex = i;
      [...wrap.children].forEach(el => el.classList.remove("active"));
      b.classList.add("active");
    });
    wrap.appendChild(b);
  });
}

function renderInstOnly
(){
  const q = items[idx];
  if(!q) return;
  document.getElementById("instText").innerHTML = miniMarkupToHTML(getInstText(q.type));
}

function setScriptAvailability(hasAny){
  qaScript.classList.toggle("disabled", !hasAny);
  panelScript.style.opacity = hasAny ? "1" : ".28";
  panelScript.style.pointerEvents = hasAny ? "auto" : "none";
}

function renderScriptBoxes(q){
  const jaRaw = (q.script_ja || "").trim();
  const enRaw = (q.script_en || "").trim();

  const jaEl = document.getElementById("scriptJa");
  const enEl = document.getElementById("scriptEn");
  const colsEl = document.getElementById("scriptCols");

  const hasJa = jaRaw.length > 0;
  const hasEn = enRaw.length > 0;

  jaEl.classList.toggle("hidden", !hasJa);
  enEl.classList.toggle("hidden", !hasEn);

  if(hasJa) jaEl.innerHTML = miniMarkupToHTML(jaRaw);
  if(hasEn) enEl.innerHTML = miniMarkupToHTML(enRaw);

  colsEl.classList.toggle("oneCol", (hasJa && !hasEn) || (!hasJa && hasEn));
  setScriptAvailability(hasJa || hasEn);

  if(sheet.classList.contains("show") && !(hasJa || hasEn)){
    sheet.classList.remove("show");
  }
}

function render(){
  const q = items[idx];
  if(!q) return;

  showExitBar(false);

  document.getElementById("qCount").textContent = `R${roundNum} • Q: ${idx+1}/${items.length}`;
  document.getElementById("scoreBox").textContent = `Score: ${score}/${allItems.length}`;

  renderInstOnly();

  document.getElementById("promptJa").innerHTML = miniMarkupToHTML((q.prompt_ja || "").trim());
  document.getElementById("promptEn").innerHTML = miniMarkupToHTML((q.prompt_en || "").trim());

  renderImages(q.image_files || "");

  audio.src = q.audio_file || "";
  audio.pause();
  showPlayState(false);

  renderInteractionByType(q);
  renderScriptBoxes(q);

  syncSaveUI();
}

/* ========= Check ========= */
document.getElementById("checkBtn").addEventListener("click", ()=>{
  const q = items[idx];
  if(!q) return;

  const qid = q.__qid;
  const ok = checkAnswerByType(q);

  // Score = unique mastered count
  if(ok && remainingWrong.has(qid)) score += 1;

  if(ok) remainingWrong.delete(qid);
  else   remainingWrong.add(qid);

  persistWrong();
  saveLastResult();

  showResult(ok);
});

/* ========= Keyboard ========= */
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape"){
    overlay.classList.remove("show");
    sheet.classList.remove("show");
    showExitBar(false);
  }
});

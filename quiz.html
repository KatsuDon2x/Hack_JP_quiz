<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --lime:#C8FF2E;
      --panel-bg: #162c40;
      --panel-border: rgba(255,255,255,.18);
      --darkbar: rgba(45,45,45,.92);
    }

    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      padding-bottom:160px;
    }

    /* ===== top area ===== */
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:4px;
      flex-wrap:wrap;
    }
    .leftTop{ display:flex; align-items:center; gap:10px; }
    .btnImg{
      display:block;
      height:auto;
      cursor:pointer;
      user-select:none;
      -webkit-user-drag:none;
    }
    .exitBtn{ width:50px; }

    .statusRow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .statusPill{
      background:#fff;
      color:#000;
      border-radius:14px;
      padding:8px 12px;
      font-size:14px;
      font-weight:900;
      min-width:110px;
      text-align:center;
    }

    .uiToggle{
      display:flex;
      gap:8px;
      align-items:center;
      background:var(--lime);
      border-radius:14px;
      padding:6px;
    }
    .uiPill{
      padding:8px 10px;
      border-radius:12px;
      font-size:13px;
      font-weight:900;
      color:#000;
      opacity:.45;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .uiPill.on{ opacity:1; background:rgba(0,0,0,.12); }

    /* ===== instruction ===== */
    .inst{
      display:flex;
      align-items:center;
      gap:12px;
      margin:14px 0 10px;
    }
    .audioBtn{ width:72px; }
    .instText{
      font-size:16px;
      color:var(--fg);
      line-height:1.4;
    }

    /* ===== prompt ===== */
    .promptBox{ margin:10px 0 12px; }
    .promptJa{
      font-size:27px;
      line-height:1.45;
      margin:0 0 6px;
      font-weight:450;
    }
    .promptJa ruby{ ruby-position: over; }
    .promptJa rt{ font-size:0.80em; opacity:0.92; letter-spacing:0.02em; }
    .promptEn{ font-size:14px; line-height:1.5; margin:0; color:rgba(255,255,255,.82); }

    /* ===== images ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px;
      margin:10px 0 14px;
    }
    .imgCard{
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }
    .imgCard img{ width:100%; height:auto; display:block; }

    /* ===== MCQ choices ===== */
    .choices{ margin-top:6px; display:grid; gap:10px; }
    .choices.twoCol{ grid-template-columns: 1fr 1fr; }
    .choiceBtn{
      text-align:left;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      cursor:pointer;
      font-weight:600;
      font-size:16px;
      line-height:1.35;
      transition: background .12s ease, border-color .12s ease, color .12s ease;
    }
    .choiceBtn.active{
      background:var(--lime);
      border-color:rgba(0,0,0,.25);
      color:#000;
      font-weight:900;
    }

    /* ===== TYPE 6: Text input ===== */
    #inputArea{ margin-top:10px; display:none; }
    #inputArea.show{ display:block; }
    .inputField{
      width:100%;
      box-sizing:border-box;
      background:rgba(255,255,255,.07);
      border:2px solid rgba(255,255,255,.22);
      border-radius:16px;
      color:#fff;
      font-size:26px;
      font-family:inherit;
      padding:14px 18px;
      outline:none;
      transition:border-color .15s ease;
      -webkit-appearance:none;
    }
    .inputField:focus{ border-color:var(--lime); }
    .inputHint{ margin-top:8px; font-size:13px; opacity:.5; line-height:1.4; }

    /* ===== TYPE 4/5: Reorder ===== */
    #reorderArea{ margin-top:10px; display:none; }
    #reorderArea.show{ display:block; }
    .reorderLabel{ font-size:12px; opacity:.45; margin-bottom:6px; text-transform:uppercase; letter-spacing:.06em; }
    .reorderAnswer{
      min-height:60px;
      border:2px dashed rgba(255,255,255,.25);
      border-radius:16px;
      padding:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:16px;
      background:rgba(255,255,255,.03);
      transition: border-color .15s, background .15s;
    }
    .reorderAnswer.dragOver{
      border-color:var(--lime);
      background:rgba(200,255,46,.06);
    }
    .reorderBank{ display:flex; flex-wrap:wrap; gap:8px; }
    .reorderChip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      user-select:none;
      transition: background .12s, border-color .12s, color .12s, opacity .12s;
      touch-action:none;
    }
    .reorderChip:active{ opacity:.75; }
    .reorderChip.inAnswer{
      background:rgba(200,255,46,.15);
      border-color:var(--lime);
      color:var(--lime);
    }
    .reorderChip img{ height:52px; width:auto; border-radius:8px; display:block; pointer-events:none; }

    /* ===== TYPE 8: Matching ===== */
    #matchArea{ margin-top:10px; display:none; }
    #matchArea.show{ display:block; }
    .matchGrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .matchCol{ display:flex; flex-direction:column; gap:8px; }
    .matchChip{
      padding:12px 14px;
      border-radius:14px;
      border:2px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      user-select:none;
      text-align:center;
      line-height:1.35;
      transition: background .12s, border-color .12s, color .12s;
    }
    .matchChip.selected{ border-color:var(--lime); background:rgba(200,255,46,.15); color:var(--lime); }
    .matchChip.matchedCorrect{
      border-color:rgba(120,220,120,.7);
      background:rgba(60,140,60,.25);
      color:#afffaf;
      cursor:default; pointer-events:none;
    }
    .matchChip.matchedWrong{
      border-color:rgba(255,120,120,.7);
      background:rgba(140,40,40,.3);
      color:#ffaaaa;
    }
    .matchStatus{ margin-top:10px; font-size:14px; opacity:.6; min-height:20px; }

    /* ===== bottom bar ===== */
    .bottomBar{
      position:fixed;
      left:0; right:0; bottom:16px;
      display:flex;
      justify-content:center;
      z-index:40;
      pointer-events:none;
    }
    .bottomInner{
      width:min(980px, calc(100% - 28px));
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }
    .checkBtn{ width:216px; pointer-events:auto; }
    .rightActions{ display:flex; gap:10px; align-items:flex-end; pointer-events:auto; }
    .qa{
      display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.55);
      cursor:pointer; user-select:none;
      font-size:15px; color:var(--fg); white-space:nowrap;
    }
    .qa.save{ opacity:.35; }
    .qa.save.on{ opacity:1; }
    .qa .sub{ font-size:12px; color:var(--muted); }
    .qa.disabled{ opacity:.28; pointer-events:none; filter:grayscale(1); }

    /* ===== Exit confirm bar ===== */
    .exitBar{
      position:fixed; left:0; right:0; top:0;
      z-index:80; display:flex; justify-content:center;
      pointer-events:none;
      transform: translateY(-120%);
      transition: transform .18s ease;
    }
    .exitBar.show{ transform: translateY(0); }
    .exitBarInner{
      width:min(980px, calc(100% - 28px));
      background:var(--darkbar);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px; margin-top:10px; padding:12px;
      display:flex; flex-direction:row;
      justify-content:space-between; align-items:center;
      gap:14px; flex-wrap:wrap; pointer-events:auto;
    }
    .exitBtnImg{ width:min(140px, 30vw); max-width:260px; }

    /* ===== Result overlay ===== */
    .overlay{
      position:fixed; inset:0; display:none;
      align-items:flex-start; justify-content:center;
      padding-top:36px; z-index:60;
    }
    .overlay.show{ display:flex; }
    .panel{
      width:min(980px, calc(100% - 28px));
      border-radius:18px; border:1px solid var(--panel-border);
      background:var(--panel-bg); padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      transform:translateY(-16px); opacity:0;
      transition: transform .18s ease, opacity .18s ease;
    }
    .overlay.show .panel{ transform:translateY(0); opacity:1; }
    .panelTop{ display:flex; justify-content:space-between; align-items:flex-start; }
    .resultMsg{ width:min(520px, 82vw); height:auto; display:block; margin:10px 0 14px; }
    @keyframes popIn {
      0%   { transform:scale(.92); opacity:.0; }
      60%  { transform:scale(1.03); opacity:1; }
      100% { transform:scale(1); }
    }
    .overlay.show .resultMsg{ animation:popIn .22s ease both; }

    /* Correct answer display */
    .correctAnswerBox{
      margin:6px 0 14px; padding:12px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.14);
      font-size:15px; line-height:1.6; display:none;
    }
    .correctAnswerBox.show{ display:block; }
    .correctAnswerBox .label{ font-size:12px; opacity:.55; margin-bottom:4px; }

    .panelBtns{
      display:flex; justify-content:space-between;
      align-items:flex-end; gap:12px; flex-wrap:wrap;
    }
    .continueBtn{ width:220px; }
    .panelMini{ display:flex; gap:18px; align-items:center; font-size:18px; }
    .panelMini .saved{ opacity:.35; cursor:pointer; user-select:none; }
    .panelMini .saved.on{ opacity:1; }

    /* ===== Script sheet ===== */
    .sheet{
      position:fixed; left:0; right:0; bottom:-110%;
      background:rgba(40,80,50,.72);
      border-top:3px solid var(--lime);
      box-shadow:0 -16px 40px rgba(0,0,0,.55);
      transition:bottom .18s ease; z-index:70; padding:14px;
    }
    .sheet.show{ bottom:0; }
    .sheetInner{ max-width:980px; margin:0 auto; }
    .sheetTop{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .cols{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .cols.oneCol{ grid-template-columns:1fr; }
    .col{
      border:1px solid rgba(200,255,46,.32); border-radius:14px;
      padding:12px; background:rgba(200,255,46,.16);
      white-space:pre-wrap; max-height:46vh; overflow:auto;
    }
    #scriptJa{ font-size:27px; line-height:1.45; font-weight:400; }
    #scriptJa rt{ font-size:0.80em; opacity:0.92; }
    #scriptEn{ font-size:14px; line-height:1.5; color:rgba(255,255,255,.85); }

    .hidden{ display:none !important; }

    /* ===== mini-markup styles ===== */
    .thick{ font-weight:1900; letter-spacing:.02em; }
    .mk-hl{ background:rgba(255,255,0,.25); padding:0 .22em; border-radius:.28em; }
    .mk-big{ font-size:1.22em; font-weight:900; }
    .mk-small{ font-size:.86em; opacity:.98; }
    .mk-i{ font-style:italic; }
    u{ text-underline-offset:.18em; }

    /* ===== Keep-going modal ===== */
    .keepGoing{
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.9); z-index:120; padding:18px;
    }
    .keepGoing.show{ display:flex; }
    .keepGoing img{ width:min(520px,86vw); height:auto; user-select:none; -webkit-user-drag:none; }
    .keepFallback{
      width:min(520px,86vw); padding:18px 16px; border-radius:18px;
      border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.06);
      backdrop-filter:blur(10px); box-shadow:0 18px 50px rgba(0,0,0,.55); text-align:center;
    }
    .keepFallback .main{ font-size:30px; font-weight:900; margin:4px 0 6px; }
    .keepFallback .rb{ font-size:14px; opacity:.85; margin-bottom:6px; }
    .keepFallback .en{ font-size:14px; opacity:.85; }

    @media (max-width:520px){
      .exitBtn{ width:78px; }
      .audioBtn{ width:64px; }
      .checkBtn{ width:208px; }
      .promptJa{ font-size:25px; }
      #scriptJa{ font-size:25px; }
      .cols{ grid-template-columns:1fr; }
      .matchChip{ font-size:14px; padding:10px 10px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- Exit confirm bar -->
    <div class="exitBar" id="exitBar">
      <div class="exitBarInner">
        <img class="btnImg exitBtnImg" id="exitContinue"
             src="assets/ui/buttons/button-exit_confirmation-continue.png" alt="Continue" />
        <img class="btnImg exitBtnImg" id="exitQuit"
             src="assets/ui/buttons/button-exit_confirmation-quit.png" alt="Quit" />
      </div>
    </div>

    <!-- Top area -->
    <div class="top">
      <div class="leftTop">
        <img class="btnImg exitBtn" id="exitBtn"
             src="assets/ui/buttons/button-exit.png" alt="Exit" />
        <div class="statusRow">
          <div class="statusPill" id="qCount">Q: 1/1</div>
          <div class="statusPill" id="scoreBox">Score: 0/1</div>
        </div>
      </div>
      <div class="uiToggle">
        <div class="uiPill on" id="uiEn">English UI</div>
        <div class="uiPill" id="uiJa">日本語UI</div>
      </div>
    </div>

    <!-- Instruction area -->
    <div class="inst">
      <img class="btnImg audioBtn" id="playBtn"
           src="assets/ui/buttons/button-audio-play.png" alt="Play" />
      <img class="btnImg audioBtn" id="pauseBtn"
           src="assets/ui/buttons/button-audio-pause.png" alt="Pause" style="display:none;" />
      <div class="instText" id="instText">Listen</div>
    </div>

    <!-- Prompt area -->
    <div class="promptBox">
      <p class="promptJa" id="promptJa"></p>
      <p class="promptEn" id="promptEn"></p>
    </div>

    <!-- Images (type 1,2,3,6) -->
    <div class="grid" id="imgGrid" style="display:none;"></div>

    <!-- TYPE 1,2,3,7 — MCQ -->
    <div class="choices" id="choices"></div>

    <!-- TYPE 6 — Text input -->
    <div id="inputArea">
      <input class="inputField" id="inputField" type="text"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" placeholder="…" inputmode="text" enterkeyhint="done" />
      <div class="inputHint" id="inputHint"></div>
    </div>

    <!-- TYPE 4/5 — Reorder -->
    <div id="reorderArea">
      <div class="reorderLabel" id="reorderAnswerLabel">Answer</div>
      <div class="reorderAnswer" id="reorderAnswer"></div>
      <div class="reorderLabel" id="reorderBankLabel">Choices</div>
      <div class="reorderBank" id="reorderBank"></div>
    </div>

    <!-- TYPE 8 — Matching -->
    <div id="matchArea">
      <div class="matchGrid">
        <div class="matchCol" id="matchLeft"></div>
        <div class="matchCol" id="matchRight"></div>
      </div>
      <div class="matchStatus" id="matchStatus"></div>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottomBar">
    <div class="bottomInner">
      <div style="width:1px;"></div>
      <img class="btnImg checkBtn" id="checkBtn"
           src="assets/ui/buttons/button-check.png" alt="Check" />
      <div class="rightActions">
        <div class="qa" id="qaScript">🔎 <span class="sub">Script</span></div>
        <div class="qa save" id="qaSave">🔖 <span class="sub" id="saveText">Saved</span></div>
      </div>
    </div>
  </div>

  <!-- Keep-going modal -->
  <div id="keepGoingModal" class="keepGoing" aria-hidden="true">
    <img id="keepGoingImg" src="assets/ui/messages/message-keep_going.png" alt="Keep going" />
    <div id="keepGoingFallback" class="keepFallback" style="display:none;">
      <div class="rb">ぜっこうちょう</div>
      <div class="main">絶好調！</div>
      <div class="en">Zekkōchō<br>We're on a roll!!</div>
      <div style="height:14px"></div>
      <div class="rb">どんどん　いこう</div>
      <div class="main">どんどん行こう！</div>
      <div class="en">Dondon ikō<br>Let's keep going!</div>
      <div style="margin-top:14px; font-size:12px; opacity:.65;">(Tap anywhere)</div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="overlay" id="overlay">
    <div class="panel" id="resultPanel">
      <div class="panelTop">
        <img class="btnImg exitBtn" id="overlayCloseBtn"
             src="assets/ui/buttons/button-exit.png" alt="Close" />
      </div>
      <img class="resultMsg" id="resultMsg"
           src="assets/ui/messages/message-result-pin.png" alt="Result" />
      <!-- Correct answer shown on wrong answers -->
      <div class="correctAnswerBox" id="correctAnswerBox">
        <div class="label" id="correctAnswerLabel">Correct answer:</div>
        <div id="correctAnswerText"></div>
      </div>
      <div class="panelBtns">
        <img class="btnImg continueBtn" id="continueBtn"
             src="assets/ui/buttons/button-result-continue.png" alt="Continue" />
        <div class="panelMini">
          <span id="panelScript" style="cursor:pointer; user-select:none;">
            🔎 <span style="font-size:14px; color:rgba(255,255,255,.75); margin-left:6px;">Script</span>
          </span>
          <span class="saved" id="panelSave">
            🔖 <span id="panelSaveText" style="font-size:14px; color:rgba(255,255,255,.75); margin-left:6px;">Save</span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Script sheet -->
  <div class="sheet" id="sheet">
    <div class="sheetInner">
      <div class="sheetTop">
        <img class="btnImg exitBtn" id="sheetExitBtn"
             src="assets/ui/buttons/button-exit.png" alt="Exit" />
        <div style="opacity:.9; font-size:14px;">Script</div>
      </div>
      <div class="cols" id="scriptCols">
        <div class="col" id="scriptJa"></div>
        <div class="col" id="scriptEn"></div>
      </div>
    </div>
  </div>

<script>
/* =============================================
   LOCALSTORAGE KEYS
   ============================================= */
const LS_LAST_SET   = "JPQ_LAST_SET_ID";
const LS_LAST_SCORE = "JPQ_LAST_SCORE";
const LS_LAST_TOTAL = "JPQ_LAST_TOTAL";
const LS_SETS = "JPQ_SETS_CSV";
const LS_QS   = "JPQ_QUESTIONS_CSV";
const LS_UI   = "JPQ_UI_TEXT_CSV";
const LS_SAVED_Q = "JPQ_SAVED_QIDS_BY_SET";
const LS_WRONG_IDS_BY_SET = "JPQ_WRONG_IDS_BY_SET";

/* =============================================
   CSV LOADING & PARSING
   ============================================= */
async function getCSV(kind){
  const key = kind==="sets" ? LS_SETS : kind==="questions" ? LS_QS : LS_UI;
  const uploaded = localStorage.getItem(key);
  if(uploaded) return uploaded;
  const path = kind==="sets" ? "data/sets.csv" : kind==="questions" ? "data/questions.csv" : "data/ui_text.csv";
  const res = await fetch(path);
  if(!res.ok) return "";
  return await res.text();
}

function parseCSV(text){
  const rows = [];
  let row = [], cur = "", inQ = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i], n = text[i+1];
    if(c === '"'){
      if(inQ && n === '"'){ cur += '"'; i++; }
      else inQ = !inQ;
    } else if(c === ',' && !inQ){
      row.push(cur); cur = "";
    } else if((c === '\n' || c === '\r') && !inQ){
      if(c === '\r' && n === '\n') i++;
      row.push(cur);
      if(row.some(v => v.trim() !== "")) rows.push(row);
      row = []; cur = "";
    } else cur += c;
  }
  row.push(cur);
  if(row.some(v => v.trim() !== "")) rows.push(row);
  const header = rows.shift().map(h => h.trim());
  return rows.map(r => {
    const o = {};
    header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
    return o;
  });
}

/* =============================================
   MINI MARKUP
   ============================================= */
function decodeHTMLEntities(str){
  const t = document.createElement("textarea");
  t.innerHTML = String(str ?? "");
  return t.value;
}
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function miniMarkupToHTML(s){
  if(!s) return "";
  let out = decodeHTMLEntities(String(s));
  out = out.replace(/\[br\]/gi, "<br>");
  out = out.replace(/\[ruby\]([\s\S]*?)\[rt\]([\s\S]*?)\[\/rt\]\[\/ruby\]/gi,
    (_, rb, rt) => `<ruby>${escapeHTML(rb)}<rt>${escapeHTML(rt)}</rt></ruby>`);
  out = out.replace(/\[b\]([\s\S]*?)\[\/b\]/gi, "<b>$1</b>");
  out = out.replace(/\[i\]([\s\S]*?)\[\/i\]/gi, '<span class="mk-i">$1</span>');
  out = out.replace(/\[u\]([\s\S]*?)\[\/u\]/gi, "<u>$1</u>");
  out = out.replace(/\[hl\]([\s\S]*?)\[\/hl\]/gi, '<span class="mk-hl">$1</span>');
  out = out.replace(/\[big\]([\s\S]*?)\[\/big\]/gi, '<span class="mk-big">$1</span>');
  out = out.replace(/\[small\]([\s\S]*?)\[\/small\]/gi, '<span class="mk-small">$1</span>');
  out = out.replace(/\[thick\]([\s\S]*?)\[\/thick\]/gi, '<span class="thick">$1</span>');
  return out;
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderMCQ(q){
  document.getElementById("choices").style.display = "";

  wrap.innerHTML = "";
  mcqSelectedIndex = null;

  const rawParts = (q.choices_text||"").split("|").map(v => v.trim()).filter(Boolean);
  const pairs = rawParts.map((text, origIdx) => ({ text, origIdx }));

  const qt = getQType(q);
  const noShuffle = isType(qt, 1);
  const shown = noShuffle ? pairs : shuffle(pairs);

  let correctOrig = parseInt(q.answer_index||"0", 10);
  if(!Number.isFinite(correctOrig)) correctOrig = 0;
  if(correctOrig >= 1 && correctOrig <= pairs.length && String(q.answer_index).trim() !== "0") correctOrig--;
  mcqCorrectIndex = shown.findIndex(p => p.origIdx === correctOrig);

  const long = shown.some(p => (p.text||"").length > 22);
  wrap.classList.toggle("twoCol", !long);

  shown.forEach((p, i) => {
    const b = document.createElement("button"); b.className = "choiceBtn";
    b.innerHTML = miniMarkupToHTML(p.text);
    b.addEventListener("click", () => {
      mcqSelectedIndex = i;
      [...wrap.children].forEach(el => el.classList.remove("active"));
      b.classList.add("active");
    });
    wrap.appendChild(b);
  });
}

function checkMCQ(q){
  if(mcqSelectedIndex === null) return false; // nothing selected
  const ok = mcqSelectedIndex === mcqCorrectIndex;
  const qid = q.__qid;
  if(ok && remainingWrong.has(qid)) score++;
  if(ok) remainingWrong.delete(qid); else remainingWrong.add(qid);
  persistWrong(); saveLastResult();
  showResult(ok, "");
  return true;
}

/* =============================================
   TYPE 4/5 — REORDER
   choices_text (type 4) or image_files (type 5) pipe-delimited;
   correct order = CSV order; user taps chips into answer zone.
   In-answer zone: tap to remove, drag to reorder (desktop).
   ============================================= */
function renderReorder(q){
  document.getElementById("reorderArea").classList.add("show");

  const qt = getQType(q);
  const isImg = isType(qt, 5) || qt.includes("image");
  const raw = isImg ? (q.image_files||"") : (q.choices_text||"");
  const parts = raw.split("|").map(s => s.trim()).filter(Boolean);

  reorderCorrect = [...parts];

  const answerEl = document.getElementById("reorderAnswer");
  const bankEl   = document.getElementById("reorderBank");
  answerEl.innerHTML = "";
  bankEl.innerHTML   = "";

  // Localise labels
  document.getElementById("reorderAnswerLabel").textContent = uiMode==="ja" ? "答え" : "Answer";
  document.getElementById("reorderBankLabel").textContent   = uiMode==="ja" ? "選択肢" : "Choices";

  const bankOrder = shuffle([...parts]);

  function makeChip(value){
    const chip = document.createElement("div");
    chip.className = "reorderChip";
    chip.dataset.value = value;
    chip.draggable = true;
    if(isImg){
      const img = document.createElement("img"); img.src = value; img.alt = ""; chip.appendChild(img);
    } else {
      chip.innerHTML = miniMarkupToHTML(value);
    }
    return chip;
  }

  // Place all chips in bank first
  for(const val of bankOrder){
    const chip = makeChip(val);
    // Click: move between bank ↔ answer zone (skip if a touch-drag just finished)
    chip.addEventListener("click", () => {
      if(touchDragChip) return; // mid-drag, ignore
      if(chip.parentElement === answerEl){
        chip.classList.remove("inAnswer");
        bankEl.appendChild(chip);
      } else {
        chip.classList.add("inAnswer");
        answerEl.appendChild(chip);
      }
    });
    bankEl.appendChild(chip);
  }

  // Drag-to-reorder within answerEl — supports both mouse (desktop) and touch (mobile)
  let dragSrc = null;

  // ---- Mouse / pointer drag (desktop) ----
  answerEl.addEventListener("dragstart", e => {
    dragSrc = e.target.closest(".reorderChip");
    if(dragSrc){ e.dataTransfer.effectAllowed = "move"; dragSrc.style.opacity = ".45"; }
  });
  answerEl.addEventListener("dragend", () => {
    if(dragSrc){ dragSrc.style.opacity = ""; dragSrc = null; }
  });
  answerEl.addEventListener("dragover", e => {
    e.preventDefault();
    answerEl.classList.add("dragOver");
    const target = e.target.closest(".reorderChip");
    if(target && target !== dragSrc){
      const rect = target.getBoundingClientRect();
      const before = e.clientX < rect.left + rect.width / 2;
      if(before) answerEl.insertBefore(dragSrc, target);
      else        answerEl.insertBefore(dragSrc, target.nextSibling);
    }
  });
  answerEl.addEventListener("dragleave", () => answerEl.classList.remove("dragOver"));
  answerEl.addEventListener("drop", e => { e.preventDefault(); answerEl.classList.remove("dragOver"); });

  // ---- Touch drag (mobile) ----
  // We use a ghost element that follows the finger
  let touchDragChip = null;
  let touchGhost    = null;

  function touchDragStart(chip, e){
    if(chip.parentElement !== answerEl) return; // only drag chips already in answer zone
    e.preventDefault();
    touchDragChip = chip;
    chip.style.opacity = ".45";

    // Create ghost
    const ghost = chip.cloneNode(true);
    ghost.style.cssText = `
      position:fixed; pointer-events:none; z-index:999;
      opacity:.85; transform:scale(1.06);
      transition:none;
    `;
    const rect = chip.getBoundingClientRect();
    ghost.style.width  = rect.width  + "px";
    ghost.style.height = rect.height + "px";
    ghost.style.left   = rect.left   + "px";
    ghost.style.top    = rect.top    + "px";
    document.body.appendChild(ghost);
    touchGhost = ghost;
  }

  function touchDragMove(e){
    if(!touchDragChip || !touchGhost) return;
    e.preventDefault();
    const t = e.touches[0];
    const gw = parseFloat(touchGhost.style.width);
    const gh = parseFloat(touchGhost.style.height);
    touchGhost.style.left = (t.clientX - gw / 2) + "px";
    touchGhost.style.top  = (t.clientY - gh / 2) + "px";

    // Find chip under finger (excluding ghost & dragSrc)
    touchGhost.style.display = "none";
    const el = document.elementFromPoint(t.clientX, t.clientY);
    touchGhost.style.display = "";
    const target = el && el.closest(".reorderChip");
    if(target && target !== touchDragChip && target.parentElement === answerEl){
      const rect = target.getBoundingClientRect();
      const before = t.clientX < rect.left + rect.width / 2;
      if(before) answerEl.insertBefore(touchDragChip, target);
      else        answerEl.insertBefore(touchDragChip, target.nextSibling);
    }
  }

  function touchDragEnd(){
    if(!touchDragChip) return;
    touchDragChip.style.opacity = "";
    touchDragChip = null;
    if(touchGhost){ touchGhost.remove(); touchGhost = null; }
  }

  // Attach touch events to each chip in the answer zone via delegation on answerEl
  answerEl.addEventListener("touchstart", e => {
    const chip = e.target.closest(".reorderChip");
    if(chip && chip.parentElement === answerEl) touchDragStart(chip, e);
  }, { passive: false });
  document.addEventListener("touchmove",  touchDragMove,  { passive: false });
  document.addEventListener("touchend",   touchDragEnd,   { passive: true });
  document.addEventListener("touchcancel",touchDragEnd,   { passive: true });
}

function checkReorder(q){
  const answerEl = document.getElementById("reorderAnswer");
  const chips = [...answerEl.querySelectorAll(".reorderChip")];
  if(!chips.length || chips.length < reorderCorrect.length) return; // incomplete

  const userOrder = chips.map(c => c.dataset.value);
  const ok = userOrder.every((v, i) => v === reorderCorrect[i]);

  const qid = q.__qid;
  if(ok && remainingWrong.has(qid)) score++;
  if(ok) remainingWrong.delete(qid); else remainingWrong.add(qid);
  persistWrong(); saveLastResult();

  const qt = getQType(q);
  const isImg = isType(qt, 5) || qt.includes("image");
  let correctHtml = "";
  if(!ok){
    if(isImg){
      correctHtml = reorderCorrect
        .map(src => `<img src="${escapeHTML(src)}" style="height:44px;border-radius:6px;margin:2px;vertical-align:middle;">`)
        .join(" ");
    } else {
      correctHtml = reorderCorrect.map(v => `<strong>${miniMarkupToHTML(v)}</strong>`).join(" → ");
    }
  }
  showResult(ok, correctHtml);
}

/* =============================================
   TYPE 8 — MATCHING
   choices_text = "left=right|left=right|…"
   Tap one left + one right → check pair.
   All correct pairs → auto-pass on final pair.
   Any wrong pair flashes red, question marked wrong.
   ============================================= */
function renderMatching(q){
  document.getElementById("matchArea").classList.add("show");

  const rawPairs = (q.choices_text||"").split("|").map(s => s.trim()).filter(Boolean);
  matchPairs = rawPairs.map(p => {
    const eq = p.indexOf("=");
    return eq >= 0 ? { left: p.slice(0, eq).trim(), right: p.slice(eq+1).trim() } : { left: p, right: p };
  });

  matchSelectedSide = null; matchSelectedIdx = null;
  matchedCount = 0;

  document.getElementById("matchStatus").textContent = "";

  const leftEl  = document.getElementById("matchLeft");
  const rightEl = document.getElementById("matchRight");
  leftEl.innerHTML = ""; rightEl.innerHTML = "";

  const rightShuffled = shuffle(matchPairs.map((p, i) => ({ ...p, origIdx: i })));

  matchPairs.forEach((p, i) => {
    const chip = document.createElement("div");
    chip.className = "matchChip";
    chip.innerHTML = miniMarkupToHTML(p.left);
    chip.dataset.side = "left"; chip.dataset.idx = String(i);
    chip.addEventListener("click", () => onMatchTap(chip, "left", i));
    leftEl.appendChild(chip);
  });

  rightShuffled.forEach(p => {
    const chip = document.createElement("div");
    chip.className = "matchChip";
    chip.innerHTML = miniMarkupToHTML(p.right);
    chip.dataset.side = "right"; chip.dataset.idx = String(p.origIdx);
    chip.addEventListener("click", () => onMatchTap(chip, "right", p.origIdx));
    rightEl.appendChild(chip);
  });
}

function getAllMatchChips(){
  return [
    ...document.getElementById("matchLeft").querySelectorAll(".matchChip"),
    ...document.getElementById("matchRight").querySelectorAll(".matchChip")
  ];
}
function clearMatchSelection(){
  getAllMatchChips().forEach(c => {
    if(!c.classList.contains("matchedCorrect") && !c.classList.contains("matchedWrong"))
      c.classList.remove("selected");
  });
  matchSelectedSide = null; matchSelectedIdx = null;
}
function getMatchChipEl(side, idx){
  const col = side === "left" ? document.getElementById("matchLeft") : document.getElementById("matchRight");
  return col.querySelector(`[data-idx="${idx}"]`);
}

function onMatchTap(chip, side, idx){
  if(chip.classList.contains("matchedCorrect")) return;
  if(chip.classList.contains("matchedWrong")) return;

  // If same side tapped: change selection
  if(matchSelectedSide === side){
    clearMatchSelection();
    chip.classList.add("selected");
    matchSelectedSide = side; matchSelectedIdx = idx;
    return;
  }

  // First tap
  if(!matchSelectedSide){
    clearMatchSelection();
    chip.classList.add("selected");
    matchSelectedSide = side; matchSelectedIdx = idx;
    return;
  }

  // Second tap on opposite side — evaluate pair
  const leftIdx  = side === "right" ? matchSelectedIdx : idx;
  const rightIdx = side === "right" ? idx : matchSelectedIdx;
  const leftChip  = getMatchChipEl("left",  leftIdx);
  const rightChip = getMatchChipEl("right", rightIdx);

  clearMatchSelection();

  const correct = (leftIdx === rightIdx); // pair is correct when indices match (right was shuffled by origIdx)

  if(correct){
    leftChip.classList.add("matchedCorrect");
    rightChip.classList.add("matchedCorrect");
    matchedCount++;

    // Auto-finish when all matched — always correct
    if(matchedCount === matchPairs.length){
      finishMatching(items[idx], true);
    }
  } else {
    // Wrong pair — flash briefly, user can retry freely
    if(leftChip)  leftChip.classList.add("matchedWrong");
    if(rightChip) rightChip.classList.add("matchedWrong");
    document.getElementById("matchStatus").textContent =
      uiMode === "ja" ? "不正解。もう一度！" : "Incorrect — try again!";
    setTimeout(() => {
      if(leftChip)  leftChip.classList.remove("matchedWrong");
      if(rightChip) rightChip.classList.remove("matchedWrong");
      document.getElementById("matchStatus").textContent = "";
    }, 750);
  }
}
function idx_q(){ return idx; }

function finishMatching(q, ok){
  const qid = q.__qid;
  if(ok && remainingWrong.has(qid)) score++;
  if(ok) remainingWrong.delete(qid); else remainingWrong.add(qid);
  persistWrong(); saveLastResult();
  showResult(ok, "");
}

function checkMatching(q){
  // Manual check press — correct only if all pairs matched
  const ok = matchedCount === matchPairs.length;
  finishMatching(q, ok);
}

/* =============================================
   MAIN RENDER
   ============================================= */
function render(){
  const q = items[idx]; if(!q) return;

  showExitBar(false);
  hideAllInputAreas();

  document.getElementById("qCount").textContent = `R${roundNum} • Q: ${idx+1}/${items.length}`;
  document.getElementById("scoreBox").textContent = `Score: ${score}/${allItems.length}`;

  renderInstOnly();
  document.getElementById("promptJa").innerHTML = miniMarkupToHTML((q.prompt_ja||"").trim());
  document.getElementById("promptEn").innerHTML = miniMarkupToHTML((q.prompt_en||"").trim());

  audio.src = q.audio_file || ""; audio.pause(); showPlayState(false);
  renderScriptBoxes(q);
  syncSaveUI();

  const qt = getQType(q);

  if(isType(qt, 6) || qt === "q_type_6_input"){
    renderImages(q.image_files||"");
    renderInput(q);
  } else if(isType(qt, 4) || qt === "q_type_4_reorder_text"){
    renderImages(""); renderReorder(q);
  } else if(isType(qt, 5) || qt === "q_type_5_reorder_image"){
    renderImages(""); renderReorder(q);
  } else if(isType(qt, 8) || qt === "q_type_8_matching"){
    renderImages(q.image_files||""); renderMatching(q);
  } else {
    // Type 1, 2, 3, 7
    renderImages(q.image_files||""); renderMCQ(q);
  }
}

/* =============================================
   CHECK BUTTON
   ============================================= */
document.getElementById("checkBtn").addEventListener("click", () => {
  const q = items[idx]; if(!q) return;
  const qt = getQType(q);

  if(isType(qt,6) || qt === "q_type_6_input"){
    checkInput(q);
  } else if(isType(qt,4) || qt==="q_type_4_reorder_text" || isType(qt,5) || qt==="q_type_5_reorder_image"){
    checkReorder(q);
  } else if(isType(qt,8) || qt === "q_type_8_matching"){
    checkMatching(q);
  } else {
    checkMCQ(q);
  }
});

/* =============================================
   KEYBOARD SHORTCUTS
   ============================================= */
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    overlay.classList.remove("show");
    sheet.classList.remove("show");
    showExitBar(false);
  }
});

/* =============================================
   INIT
   ============================================= */
(async function init(){
  if(!setId){ alert("Missing set_id."); location.href = "menu.html"; return; }

  const qsCSV = await getCSV("questions");
  if(!qsCSV){ alert("questions.csv not available. Open upload.html and upload CSV files."); location.href = "upload.html"; return; }

  const uiCSV = await getCSV("ui");
  if(uiCSV) uiTextMap = buildUiTextMap(parseCSV(uiCSV));

  const all = parseCSV(qsCSV);
  allItems = all.filter(r => r.set_id === setId);
  allItems.forEach((q, i) => { q.__qid = getQId(q, i); });
  items = [...allItems];

  if(mode === "review"){
    const ids = getWrongIdsForSet(setId);
    if(!ids.length){ alert("No wrong questions saved for this quiz yet."); location.href = "menu.html"; return; }
    items = ids.map(id => allItems.find(q => q.__qid === id)).filter(Boolean);
    roundNum = 1; remainingWrong = new Set(ids); score = 0;
    saveLastResult(); persistWrong(); render(); return;
  }

  if(mode === "saved"){
    const ids = getSavedIdsForSet(setId);
    if(!ids.length){ alert("No saved questions yet for this quiz."); location.href = "menu.html"; return; }
    items = ids.map(id => allItems.find(q => q.__qid === id)).filter(Boolean);
    roundNum = 1; remainingWrong = new Set(ids); score = 0;
    saveLastResult(); persistWrong(); render(); return;
  }

  if(!allItems.length){ alert("No questions found for this set_id."); location.href = "menu.html"; return; }

  roundNum = 1;
  remainingWrong = new Set(allItems.map(q => q.__qid));
  score = 0;
  saveLastResult(); persistWrong();
  render();
})();
</script>
